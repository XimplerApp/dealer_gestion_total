<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Galera RICO v2.1.1 — Sistema Integral Dealer Semillas</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root{
  --bg:#0f172a;--shell:#0b1220;--card:#182337;--card2:#111827;--line:#334155;--soft:#22314c;
  --text:#e5edf8;--muted:#9aa8bb;--primary:#38bdf8;--green:#22c55e;--yellow:#facc15;--orange:#f59e0b;--red:#ef4444;--purple:#a78bfa;
  --shadow:0 14px 36px rgba(0,0,0,.25);--radius:18px;
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{margin:0;background:radial-gradient(circle at 20% 0%,#172554 0%,#0f172a 36%,#0b1220 100%);color:var(--text);font-family:Inter,Arial,Helvetica,sans-serif;font-size:14px}
button,input,select,textarea{font-family:inherit}
button{border:none;border-radius:10px;padding:10px 13px;font-weight:900;cursor:pointer;transition:.15s;white-space:nowrap}
button:hover{transform:translateY(-1px);filter:brightness(1.05)}
input,select,textarea{width:100%;padding:10px;border-radius:10px;border:1px solid var(--line);background:#0b1220;color:var(--text);outline:none}
input:focus,select:focus,textarea:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(56,189,248,.10)}
textarea{min-height:78px;resize:vertical}
label{display:block;margin:8px 0 5px;color:var(--muted);font-size:12px;font-weight:900;letter-spacing:.01em}
a{color:var(--primary)}
.app{min-height:100vh;display:grid;grid-template-columns:285px minmax(0,1fr)}
.sidebar{position:sticky;top:0;height:100vh;overflow:auto;background:rgba(8,13,26,.96);border-right:1px solid var(--line);padding:18px 13px;z-index:10}
.brand{border:1px solid var(--line);background:linear-gradient(145deg,rgba(56,189,248,.11),rgba(167,139,250,.08));border-radius:18px;padding:16px;margin-bottom:14px}
.brand h1{font-size:20px;line-height:1.15;margin:0;color:var(--primary);font-weight:1000}.brand p{margin:8px 0 0;color:var(--muted);font-size:12px;line-height:1.35}
.nav-title{font-size:11px;color:#64748b;text-transform:uppercase;letter-spacing:.11em;font-weight:1000;margin:16px 9px 6px}
.nav button{width:100%;display:flex;align-items:center;gap:9px;background:transparent;color:var(--muted);border-left:3px solid transparent;text-align:left;margin:2px 0;padding:11px 10px}
.nav button.active,.nav button:hover{background:rgba(56,189,248,.10);color:var(--text);border-left-color:var(--primary)}
.main{width:100%;max-width:1550px;margin:0 auto;padding:24px}
.topbar{display:flex;align-items:flex-start;justify-content:space-between;gap:18px;flex-wrap:wrap;border:1px solid var(--line);border-radius:22px;padding:21px;margin-bottom:18px;background:linear-gradient(135deg,rgba(30,41,59,.94),rgba(15,23,42,.94));box-shadow:var(--shadow)}
.topbar h2{margin:0;color:var(--primary);font-size:26px;letter-spacing:-.02em}.topbar p{margin:8px 0 0;color:var(--muted);line-height:1.45;max-width:950px}.top-actions{display:flex;gap:10px;flex-wrap:wrap}
.page{display:none}.page.active{display:block}
.card{background:rgba(24,35,55,.97);border:1px solid var(--line);border-radius:var(--radius);padding:18px;margin-bottom:18px;box-shadow:0 8px 24px rgba(0,0,0,.18)}
.card h2,.card h3{margin-top:0;color:var(--primary)}.card h2{font-size:20px}.card h3{font-size:16px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px}.grid-2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}.grid-3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px}.grid-4{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px}.grid-5{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:12px}
.actions{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-top:13px}.actions.no-margin{margin:0}.actions button{width:auto}
.btn-primary{background:var(--primary);color:#062033}.btn-success{background:var(--green);color:#052e16}.btn-warning{background:var(--orange);color:#111827}.btn-danger{background:var(--red);color:white}.btn-secondary{background:#0b1220;color:var(--text);border:1px solid var(--line)}.btn-purple{background:var(--purple);color:#1e1b4b}.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--line)}.btn-sm{font-size:12px;padding:7px 9px}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:12px}.kpi{background:#0b1220;border:1px solid var(--line);border-radius:16px;padding:14px;min-height:110px}.kpi .label{font-size:12px;color:var(--muted);font-weight:900;line-height:1.25}.kpi .value{font-size:25px;font-weight:1000;margin-top:8px}.kpi .sub{font-size:12px;color:var(--muted);line-height:1.35;margin-top:7px}.kpi.good{border-left:4px solid var(--green)}.kpi.warn{border-left:4px solid var(--yellow)}.kpi.bad{border-left:4px solid var(--red)}.kpi.info{border-left:4px solid var(--primary)}
.notice{background:#0b1220;border:1px solid var(--line);border-radius:14px;padding:13px;line-height:1.45}.notice + .notice{margin-top:10px}.notice.warn{border-left:4px solid var(--yellow);background:#1f1b08;color:#fde68a}.notice.bad{border-left:4px solid var(--red);background:#2a1014;color:#fecaca}.notice.good{border-left:4px solid var(--green);background:#082713;color:#bbf7d0}.notice.info{border-left:4px solid var(--primary)}
.muted{color:var(--muted)}.small{font-size:12px}.green{color:var(--green)}.yellow{color:var(--yellow)}.red{color:#fca5a5}.blue{color:var(--primary)}.right{text-align:right}.center{text-align:center}.nowrap{white-space:nowrap}.hidden{display:none!important}
.table-wrap{overflow:auto;border:1px solid var(--line);border-radius:14px;margin-top:12px}table{width:100%;border-collapse:collapse;font-size:13px}th,td{padding:10px;border-bottom:1px solid var(--line);vertical-align:top;text-align:left}th{position:sticky;top:0;background:#0b1220;color:var(--primary);font-size:12px;z-index:1}tr:hover td{background:rgba(255,255,255,.025)}
.pill{display:inline-block;border:1px solid var(--line);border-radius:999px;padding:4px 9px;font-size:12px;font-weight:1000;background:#0b1220;color:var(--muted)}.pill.green{color:var(--green);background:rgba(34,197,94,.14);border-color:rgba(34,197,94,.35)}.pill.yellow{color:var(--yellow);background:rgba(250,204,21,.14);border-color:rgba(250,204,21,.35)}.pill.red{color:#fca5a5;background:rgba(239,68,68,.14);border-color:rgba(239,68,68,.35)}.pill.blue{color:var(--primary);background:rgba(56,189,248,.13);border-color:rgba(56,189,248,.35)}.pill.purple{color:var(--purple);background:rgba(167,139,250,.13);border-color:rgba(167,139,250,.35)}
.tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}.tabs button{background:#0b1220;color:var(--muted);border:1px solid var(--line)}.tabs button.active{background:var(--primary);color:#062033;border-color:var(--primary)}.sub{display:none}.sub.active{display:block}
.section-title{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap}.split{display:grid;grid-template-columns:1.15fr .85fr;gap:14px}.progress{height:9px;background:#0b1220;border:1px solid var(--line);border-radius:999px;overflow:hidden}.progress span{display:block;height:100%;background:var(--primary);width:0}.stagebar{display:grid;grid-template-columns:repeat(8,1fr);gap:4px;margin:6px 0}.stagebar span{height:8px;background:#0b1220;border:1px solid var(--line);border-radius:4px}.stagebar span.on{background:var(--primary)}
.map{height:380px;border:1px solid var(--line);border-radius:16px;overflow:hidden;background:#0b1220}.svg-box{background:#0b1220;border:1px solid var(--line);border-radius:16px;padding:12px;overflow:auto}.svg-box svg{max-width:100%;height:auto;display:block;margin:auto}.score-row{display:grid;grid-template-columns:210px 1fr 44px;gap:10px;align-items:center;margin-bottom:10px}.score-row input{padding:0}.badge-row{display:flex;gap:8px;flex-wrap:wrap}.empty{padding:24px;text-align:center;color:var(--muted)}
.toast{position:fixed;right:20px;bottom:20px;background:#0b1220;color:var(--text);border:1px solid var(--line);padding:12px 15px;border-radius:14px;box-shadow:var(--shadow);z-index:9999;opacity:0;transform:translateY(12px);transition:.25s}.toast.show{opacity:1;transform:translateY(0)}
@media(max-width:1080px){.app{grid-template-columns:1fr}.sidebar{position:relative;height:auto}.sidebar .nav{display:grid;grid-template-columns:repeat(auto-fit,minmax(165px,1fr));gap:4px}.nav-title{grid-column:1/-1}.main{padding:14px}.split,.grid-2,.grid-3,.grid-4,.grid-5{grid-template-columns:1fr}.actions button{width:100%}.score-row{grid-template-columns:1fr}.top-actions{width:100%}.top-actions button{width:100%}.stagebar{grid-template-columns:repeat(4,1fr)}}
@media print{body{background:white;color:#111}.sidebar,.top-actions,.actions,.tabs{display:none!important}.app{display:block}.main{padding:0}.card,.kpi{box-shadow:none;border-color:#ccc;background:white;color:#111}.page{display:block!important}}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="brand">
      <h1>🌾 Galera RICO v2.1</h1>
      <p>Sistema integral para dealer de semillas: campo, eventos, pipeline, S&OP, cartera e inteligencia varietal.</p>
    </div>
    <div class="nav" id="nav"></div>
  </aside>
  <main class="main">
    <div class="topbar">
      <div><h2 id="pageTitle">Dashboard Ejecutivo</h2><p id="pageSub">Cada dato debe terminar en una decisión: escalar, ajustar, detener, comprar, cobrar o bloquear.</p></div>
      <div class="top-actions">
        <button class="btn-secondary" onclick="APP.render()">🔄 Recalcular</button>
        <button class="btn-success" onclick="APP.exportWorkbook()">📤 Exportar Excel</button>
        <button class="btn-purple" onclick="APP.show('calidad')">🧪 Auditoría</button>
      </div>
    </div>
    <section id="page-dashboard" class="page"></section>
    <section id="page-campo" class="page"></section>
    <section id="page-eventos" class="page"></section>
    <section id="page-pipeline" class="page"></section>
    <section id="page-sop" class="page"></section>
    <section id="page-cartera" class="page"></section>
    <section id="page-inteligencia" class="page"></section>
    <section id="page-calidad" class="page"></section>
    <section id="page-exportar" class="page"></section>
  </main>
</div>
<div id="toast" class="toast"></div>
<script>
const APP = (()=>{
  'use strict';
  const STORE_PREFIX='galera_rico_v2_';
  const K={trials:'trials',evidence:'evidence',results:'results',events:'events',leads:'leads',demand:'demand',inventory:'inventory',accounts:'accounts',scores:'scores',settings:'settings'};
  const pages=[
    ['dashboard','📊','Dashboard Ejecutivo','Visión integral: ensayos, eventos, pipeline, S&OP, cartera, alertas y decisiones.','Principal'],
    ['campo','🧪','Campo & Ensayos','Ficha técnica, evidencia georreferenciada, resultados, ROI y receta comercial.','Operación'],
    ['eventos','🎪','Eventos & Leads','Scorecard GO/NO-GO, presupuesto completo, leads y post-mortem 30/90 días.','Demanda'],
    ['pipeline','🌱','Pipeline Comercial','Seguimiento único desde lead, demo, cotización, orden, entrega, factura y cobro.','Demanda'],
    ['sop','📦','S&OP Agro','Forecast, pedidos firmes, inventario, cobertura, fill-rate y riesgo de stockout.','Control'],
    ['cartera','💳','Cartera & Crédito','Scoring A/B/C, aging, DSO, promesas de pago, bloqueos y recuperación.','Control'],
    ['inteligencia','🚀','Inteligencia Varietal','Ranking, radar, mapa, speed-to-market, adopción y banco de recetas.','Dirección'],
    ['calidad','🧭','Auditoría del Sistema','Motor de calidad de datos, conexiones faltantes, redundancias y reglas de control.','Sistema'],
    ['exportar','📤','Exportar / Respaldo','Exportación, importación, datos demo y mantenimiento del sistema local.','Sistema']
  ];
  const stages=['Lead','Contacto','Demo/Ensayo','Cotización','Orden','Entrega','Factura','Cobrado'];
  const state={page:'dashboard',sub:{campo:'ensayos',eventos:'score',cartera:'cuentas',sop:'planeacion'},editing:{},map:null};
  const $=id=>document.getElementById(id);
  const qa=(sel,root=document)=>Array.from(root.querySelectorAll(sel));
  const esc=s=>String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));
  const n=v=>{ if(v===null||v===undefined||v==='') return 0; if(typeof v==='number') return Number.isFinite(v)?v:0; const x=String(v).replace(/[$,%\s]/g,'').replace(/,/g,''); return parseFloat(x)||0; };
  const sum=arr=>arr.reduce((a,b)=>a+n(b),0);
  const avg=arr=>arr.length?sum(arr)/arr.length:0;
  const clamp=(v,min=0,max=100)=>Math.max(min,Math.min(max,n(v)));
  const uid=(p='ID')=>p+'-'+Date.now().toString(36)+'-'+Math.random().toString(36).slice(2,7).toUpperCase();
  const today=()=>new Date().toISOString().slice(0,10);
  const now=()=>new Date().toLocaleString('es-MX');
  const toDate=d=>d?new Date(String(d).includes('T')?d:d+'T12:00:00'):null;
  const daysBetween=(a,b)=>{const da=toDate(a), db=toDate(b); if(!da||!db) return null; return Math.round((db-da)/86400000);};
  const age=d=>daysBetween(d,today());
  const money=v=>'$'+n(v).toLocaleString('es-MX',{minimumFractionDigits:0,maximumFractionDigits:0});
  const dec=(v,d=1)=>n(v).toLocaleString('es-MX',{minimumFractionDigits:d,maximumFractionDigits:d});
  const pct=(v,d=1)=>dec(v,d)+'%';
  const int=v=>Math.round(n(v)).toLocaleString('es-MX');
  const norm=s=>String(s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/g,'_').replace(/^_|_$/g,'');
  const storeKey=k=>STORE_PREFIX+k;
  const read=k=>{try{return JSON.parse(localStorage.getItem(storeKey(k)))||[]}catch(e){return []}};
  const write=(k,v)=>localStorage.setItem(storeKey(k),JSON.stringify(v));
  const toast=msg=>{const t=$('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2400);};
  const eq=(a,b)=>String(a||'')===String(b||'');
  const field=id=>($(id)?.value??'').trim();
  const setVal=(id,v)=>{const el=$(id); if(el) el.value=v??'';};
  const data=()=>({trials:read(K.trials), evidence:read(K.evidence), results:read(K.results), events:read(K.events), leads:read(K.leads), demand:read(K.demand), inventory:read(K.inventory), accounts:read(K.accounts), scores:read(K.scores)});
  function pill(text,type='blue'){return `<span class="pill ${type}">${esc(text)}</span>`}
  function clsScore(v,good=75,warn=50){v=n(v); return v>=good?'good':v>=warn?'warn':'bad'}
  function kpi(label,value,sub='',cls='info'){return `<div class="kpi ${cls}"><div class="label">${label}</div><div class="value">${value}</div>${sub?`<div class="sub">${sub}</div>`:''}</div>`}
  function table(headers,rows){return `<div class="table-wrap"><table><thead><tr>${headers.map(h=>`<th>${h}</th>`).join('')}</tr></thead><tbody>${rows.length?rows.join(''):`<tr><td colspan="${headers.length}" class="empty">Sin registros todavía.</td></tr>`}</tbody></table></div>`}
  function btns(entity,id){return `<div class="actions no-margin"><button class="btn-warning btn-sm" onclick="APP.edit('${entity}','${esc(id)}')">✏️</button><button class="btn-danger btn-sm" onclick="APP.remove('${entity}','${esc(id)}')">🗑</button></div>`}
  function selectOptions(arr,labelFn,empty='Selecciona'){return `<option value="">${empty}</option>`+arr.map(x=>`<option value="${esc(x.id)}">${esc(labelFn(x))}</option>`).join('')}
  function trialLabel(t){return t?`${t.id} · ${t.cultivo||'Cultivo'} · ${t.variedad||'Variedad'} · ${t.productor||'Productor'}`:'Ensayo no encontrado'}
  function eventLabel(e){return e?`${e.id} · ${e.nombre||'Evento'} · ${e.zona||''}`:'Evento no encontrado'}
  function buildNav(){
    const groups={}; pages.forEach(p=>{groups[p[4]]=groups[p[4]]||[]; groups[p[4]].push(p)});
    $('nav').innerHTML=Object.entries(groups).map(([g,items])=>`<div class="nav-title">${g}</div>`+items.map(p=>`<button id="nav-${p[0]}" onclick="APP.show('${p[0]}')"><span>${p[1]}</span>${p[2]}</button>`).join('')).join('');
  }
  function show(page){
    state.page=page; qa('.page').forEach(x=>x.classList.remove('active')); qa('.nav button').forEach(x=>x.classList.remove('active'));
    $(`page-${page}`)?.classList.add('active'); $(`nav-${page}`)?.classList.add('active');
    const meta=pages.find(p=>p[0]===page); $('pageTitle').textContent=meta?.[2]||''; $('pageSub').textContent=meta?.[3]||'';
    render(); window.scrollTo({top:0,behavior:'smooth'});
  }
  function sub(prefix,name){ state.sub[prefix]=name; render(); }
  function render(){ const f={dashboard:renderDashboard,campo:renderCampo,eventos:renderEventos,pipeline:renderPipeline,sop:renderSOP,cartera:renderCartera,inteligencia:renderInteligencia,calidad:renderCalidad,exportar:renderExportar}[state.page]; if(f) f(); }

  function latestResultsByTrial(){ const out={}; read(K.results).forEach(r=>{if(!r.trialId)return; if(!out[r.trialId]||String(r.fecha)>String(out[r.trialId].fecha)) out[r.trialId]=r}); return out; }
  function resultCalcFromForm(prefix='res_'){
    const d=data(); const trial=d.trials.find(t=>eq(t.id,field(prefix+'trialId')));
    const area=n(field(prefix+'areaHa')) || n(trial?.superficieHa) || 1;
    const rc=n(field(prefix+'rendControl')), rt=n(field(prefix+'rendTratado'));
    const diffTon=rt-rc, diffKg=diffTon*1000*area;
    const mejoraPct=rc?diffTon/rc*100:0;
    const unitMargin=n(field(prefix+'precioKg'))-n(field(prefix+'costoVariableKg'));
    const margen=diffKg*unitMargin;
    const costo=n(field(prefix+'semilla'))+n(field(prefix+'insumos'))+n(field(prefix+'materiales'))+n(field(prefix+'horasTec'))*n(field(prefix+'costoHora'))+n(field(prefix+'traslados'))+n(field(prefix+'otros'));
    const roiPct=costo?((margen-costo)/costo)*100:0;
    const evaluacion=roiPct>=30&&mejoraPct>0?'Exitoso':(roiPct>=0||mejoraPct>0?'Parcial':'No exitoso');
    const recomendacion=evaluacion==='Exitoso'?'Escalar / convertir en receta':evaluacion==='Parcial'?'Repetir con ajustes técnicos/comerciales':'Detener o rediseñar antes de repetir';
    return {areaHa:area,diffTon,diffKg,mejoraPct,unitMargin,margen,costo,roiPct,evaluacion,recomendacion};
  }
  function eventCalcFromForm(){
    const weights={estrategia:20,audiencia:20,inventario:15,timing:15,roi:20,seguimiento:10};
    const vals={estrategia:n(field('ev_estrategia')),audiencia:n(field('ev_audiencia')),inventario:n(field('ev_inventario')),timing:n(field('ev_timing')),roi:n(field('ev_roiScore')),seguimiento:n(field('ev_seguimiento'))};
    const score=Object.entries(vals).reduce((a,[k,v])=>a+(clamp(v,0,20)/20*weights[k]),0);
    const cost=n(field('ev_costosDirectos'))+n(field('ev_horasTec'))*n(field('ev_costoHoraTec'))+n(field('ev_horasCom'))*n(field('ev_costoHoraCom'))+n(field('ev_captacion'))+n(field('ev_seguimientoCosto'))+n(field('ev_otros'));
    const margin=n(field('ev_margenAtribuible'));
    const roiPct=cost?((margin-cost)/cost)*100:0;
    const minRoi=field('ev_condicion')==='Repetido'?50:(field('ev_tipo')==='Finca demostrativa'?40:30);
    const decision=score>=75 && roiPct>=minRoi && cost>0 ? 'GO':'NO-GO';
    const cpl=n(field('ev_leadsMeta'))?cost/n(field('ev_leadsMeta')):0;
    return {score, cost, roiPct, minRoi, decision, cpl};
  }
  function leadStageValue(stage){ const i=stages.indexOf(stage); return i<0?0:i; }
  function leadIsOrder(l){return leadStageValue(l.stage)>=4}
  function leadIsClosed(l){return l.stage==='Cobrado'}
  function calcDashboard(){
    const d=data(); const latest=latestResultsByTrial(); const resultVals=Object.values(latest); const trialsWithSales=new Set(d.leads.filter(leadIsOrder).map(l=>l.trialId).filter(Boolean));
    const trialConversion=d.trials.length?trialsWithSales.size/d.trials.length*100:0;
    const eventRoi=avg(d.events.map(e=>n(e.roiPct))); const leadToOrder=d.leads.length?d.leads.filter(leadIsOrder).length/d.leads.length*100:0;
    const twoTouches=d.leads.length?d.leads.filter(l=>l.firstTouch&&l.secondTouch&&daysBetween(l.firstTouch,l.secondTouch)<=7).length/d.leads.length*100:0;
    const sop=calcSOP(); const cartera=calcCartera(); const quality=qualityAudit();
    return {roiTrials:avg(resultVals.map(r=>r.roiPct)), trialConversion,eventRoi, leadToOrder,twoTouches,sop,cartera,quality, resultVals};
  }
  function calcSOP(){
    const d=data(); const vars=[...new Set([...d.demand.map(x=>x.variedad),...d.inventory.map(x=>x.variedad)].filter(Boolean))];
    let firm=0, covered=0, stockouts=0, coverageList=[], overstock=0;
    vars.forEach(v=>{
      const dem=d.demand.filter(x=>x.variedad===v); const inv=d.inventory.filter(x=>x.variedad===v);
      const pedidos=sum(dem.map(x=>x.pedidosFirmes)); const weekly=sum(dem.map(x=>x.demandaSemanal)) || sum(inv.map(x=>x.demandaSemanal));
      const invNet=sum(inv.map(x=>n(x.disponible)-n(x.comprometido)+n(x.transito)));
      firm+=pedidos; covered+=Math.min(pedidos,Math.max(0,invNet)); if(pedidos>0 && invNet<pedidos) stockouts++; const cov=weekly?invNet/weekly:0; if(cov) coverageList.push(cov); if(cov>8) overstock++;
    });
    const fillRate=firm?covered/firm*100:0;
    return {fillRate,stockouts,coverage:avg(coverageList),overstock,vars:vars.length};
  }
  function calcCartera(){
    const d=data(); const open=d.accounts.filter(a=>!a.paymentDate); const total=sum(open.map(a=>a.amount)); const sales90=sum(d.accounts.filter(a=>age(a.saleDate)<=90).map(a=>a.amount)); const daily=sales90/90; const dso=daily?total/daily:0;
    const aging={a0:0,a30:0,a60:0,a90:0}; open.forEach(a=>{const overdue=Math.max(0,age(a.dueDate)); if(overdue<=30) aging.a0+=n(a.amount); else if(overdue<=60) aging.a30+=n(a.amount); else if(overdue<=90) aging.a60+=n(a.amount); else aging.a90+=n(a.amount);});
    const pct60=total?(aging.a60+aging.a90)/total*100:0; const blocked=open.filter(a=>Math.max(0,age(a.dueDate))>60).length;
    return {total,dso,pct60,blocked,aging};
  }
  function qualityAudit(){
    const d=data(); const latest=latestResultsByTrial(); const alerts=[];
    d.trials.forEach(t=>{
      const evs=d.evidence.filter(e=>eq(e.trialId,t.id)); const hasLead=d.leads.some(l=>eq(l.trialId,t.id));
      const missingCore=['cultivo','variedad','control','productor','region','tecnico','siembra','objetivo','criterio'].filter(k=>!t[k] && n(t[k])===0);
      if(missingCore.length) alerts.push({sev:'warn',area:'Ficha ensayo',msg:`${t.id} tiene ficha incompleta: ${missingCore.join(', ')}`,action:'Completar datos técnicos mínimos antes de evaluar ROI o convertir a receta.'});
      if((t.vinculoComercial||'Sí')!=='No' && !(t.clienteObjetivo||t.mercadoObjetivo||t.segmentoObjetivo)) alerts.push({sev:'warn',area:'Vínculo comercial',msg:`${t.id} no define cuenta, mercado o segmento objetivo`,action:'Agregar salida comercial para evitar ensayo sin seguimiento.'});
      if(t.estado==='Activo' && t.siembra && age(t.siembra)>60 && !evs.length) alerts.push({sev:'bad',area:'Ensayos',msg:`${t.id} activo >60 días sin evidencia`,action:'Cargar bitácora, cerrar o reasignar responsable.'});
      if(t.estado==='Terminado' && !latest[t.id]) alerts.push({sev:'bad',area:'Ensayos',msg:`${t.id} terminado sin resultado ROI`,action:'Medir rendimiento, costos y decisión final.'});
      if(t.estado==='Terminado' && !hasLead) alerts.push({sev:'warn',area:'Pipeline',msg:`${t.id} terminado sin lead/oportunidad conectada`,action:'Crear lead, receta comercial o justificar descarte.'});
      if(latest[t.id] && n(latest[t.id].roiPct)<0) alerts.push({sev:'bad',area:'ROI',msg:`${t.id} ROI negativo`,action:'No repetir hasta corregir causa técnica, zona o costo.'});
    });
    d.events.forEach(e=>{ const leads=d.leads.filter(l=>eq(l.eventId,e.id)); if(e.decision==='GO' && e.fecha && age(e.fecha)>3 && !leads.length) alerts.push({sev:'warn',area:'Eventos',msg:`${e.nombre} aprobado sin leads cargados`,action:'Capturar leads o cerrar post-mortem sin retorno.'}); if(e.decision==='GO' && age(e.fecha)>30 && !e.post30) alerts.push({sev:'warn',area:'Eventos',msg:`${e.nombre} sin post-mortem 30 días`,action:'Registrar ventas atribuibles y decisión repetir/ajustar.'}); });
    d.leads.forEach(l=>{ if(l.fecha && age(l.fecha)>7 && !l.secondTouch) alerts.push({sev:'bad',area:'Leads',msg:`Lead ${l.nombre} sin 2º toque en 7 días`,action:'Contactar, programar siguiente paso o descartar con razón.'}); });
    d.accounts.forEach(a=>{ if(!a.paymentDate && Math.max(0,age(a.dueDate))>60) alerts.push({sev:'bad',area:'Cartera',msg:`${a.client} con ${money(a.amount)} vencido >60 días`,action:'Bloquear surtido y firmar plan de pago.'}); });
    const sop=calcSOP(); if(sop.stockouts>0) alerts.push({sev:'bad',area:'S&OP',msg:`${sop.stockouts} variedad(es) con riesgo de stockout`,action:'Reunión S&OP: comprar, reasignar o ajustar promoción.'});
    const penalty=sum(alerts.map(a=>a.sev==='bad'?9:4)); const score=clamp(100-penalty,0,100);
    return {score,alerts};
  }

  function renderDemand(){ const d=data(); const rows=d.demand.map(x=>`<tr><td>${esc(x.periodo)}</td><td>${esc(x.cultivo)}</td><td>${esc(x.variedad)}</td><td>${esc(x.zona)}</td><td>${money(x.pedidosFirmes)}</td><td>${money(x.pipelinePonderado)}</td><td>${money(x.forecast)}</td><td>${money(x.demandaSemanal)}</td><td>${btns('demand',x.id)}</td></tr>`); $('sop_content').innerHTML=`<div class="card"><h2>${state.editing.demand?'Editar':'Nueva'} demanda / forecast</h2><div class="grid-4"><div><label>Periodo</label><input id="dm_periodo" placeholder="Jun-Jul 2026"></div><div><label>Cultivo</label><input id="dm_cultivo"></div><div><label>Variedad *</label><input id="dm_variedad"></div><div><label>Zona</label><input id="dm_zona"></div><div><label>Pedidos firmes $</label><input id="dm_pedidosFirmes"></div><div><label>Pipeline ponderado $</label><input id="dm_pipelinePonderado"></div><div><label>Forecast total $</label><input id="dm_forecast"></div><div><label>Demanda semanal $</label><input id="dm_demandaSemanal"></div></div><div class="actions"><button class="btn-primary" onclick="APP.saveDemand()">Guardar demanda</button><button class="btn-secondary" onclick="APP.cancelEdit('demand')">Limpiar</button></div></div><div class="card"><h2>Forecast por variedad</h2>${table(['Periodo','Cultivo','Variedad','Zona','Pedidos firmes','Pipeline pond.','Forecast','Demanda semanal','Acciones'],rows)}</div>`; if(state.editing.demand)loadDemand(d.demand.find(x=>eq(x.id,state.editing.demand))); }
  function saveDemand(){ const id=state.editing.demand||uid('DEM'); const obj={id,periodo:field('dm_periodo'),cultivo:field('dm_cultivo'),variedad:field('dm_variedad'),zona:field('dm_zona'),pedidosFirmes:n(field('dm_pedidosFirmes')),pipelinePonderado:n(field('dm_pipelinePonderado')),forecast:n(field('dm_forecast')),demandaSemanal:n(field('dm_demandaSemanal'))}; if(!obj.variedad){alert('Variedad es obligatoria.');return;} upsert(K.demand,obj); state.editing.demand=null; toast('Demanda guardada'); render(); }

  function renderInventory(){ const d=data(); const rows=d.inventory.map(x=>{const net=n(x.disponible)-n(x.comprometido)+n(x.transito); const cov=n(x.demandaSemanal)?net/n(x.demandaSemanal):0; return `<tr><td>${esc(x.cultivo)}</td><td>${esc(x.variedad)}</td><td>${money(x.disponible)}</td><td>${money(x.comprometido)}</td><td>${money(x.transito)}</td><td>${money(net)}</td><td>${dec(cov,1)} sem</td><td>${cov>=5&&cov<=7?pill('Sano','green'):cov<5?pill('Riesgo','red'):pill('Sobrestock','yellow')}</td><td>${btns('inventory',x.id)}</td></tr>`}); $('sop_content').innerHTML=`<div class="card"><h2>${state.editing.inventory?'Editar':'Nuevo'} inventario</h2><div class="grid-4"><div><label>Cultivo</label><input id="iv_cultivo"></div><div><label>Variedad *</label><input id="iv_variedad"></div><div><label>Disponible $</label><input id="iv_disponible"></div><div><label>Comprometido $</label><input id="iv_comprometido"></div><div><label>En tránsito $</label><input id="iv_transito"></div><div><label>Demanda semanal $</label><input id="iv_demandaSemanal"></div><div><label>Proveedor / lote</label><input id="iv_lote"></div></div><div class="actions"><button class="btn-primary" onclick="APP.saveInventory()">Guardar inventario</button><button class="btn-secondary" onclick="APP.cancelEdit('inventory')">Limpiar</button></div></div><div class="card"><h2>Inventario y cobertura</h2>${table(['Cultivo','Variedad','Disponible','Comprometido','Tránsito','Neto','Cobertura','Estado','Acciones'],rows)}</div>`; if(state.editing.inventory)loadInventory(d.inventory.find(x=>eq(x.id,state.editing.inventory))); }
  function saveInventory(){ const id=state.editing.inventory||uid('INV'); const obj={id,cultivo:field('iv_cultivo'),variedad:field('iv_variedad'),disponible:n(field('iv_disponible')),comprometido:n(field('iv_comprometido')),transito:n(field('iv_transito')),demandaSemanal:n(field('iv_demandaSemanal')),lote:field('iv_lote')}; if(!obj.variedad){alert('Variedad es obligatoria.');return;} upsert(K.inventory,obj); state.editing.inventory=null; toast('Inventario guardado'); render(); }
  function loadInventory(x){ if(!x)return; ['cultivo','variedad','disponible','comprometido','transito','demandaSemanal','lote'].forEach(k=>setVal('iv_'+k,x[k])); }
  function renderSOPDash(){ const d=data(); const m=calcSOP(); const vars=[...new Set([...d.demand.map(x=>x.variedad),...d.inventory.map(x=>x.variedad)].filter(Boolean))]; const rows=vars.map(v=>{const dem=d.demand.filter(x=>x.variedad===v); const inv=d.inventory.filter(x=>x.variedad===v); const pedidos=sum(dem.map(x=>x.pedidosFirmes)); const forecast=sum(dem.map(x=>x.forecast)); const net=sum(inv.map(x=>n(x.disponible)-n(x.comprometido)+n(x.transito))); const weekly=sum(dem.map(x=>x.demandaSemanal))||sum(inv.map(x=>x.demandaSemanal)); const cov=weekly?net/weekly:0; let decision='Mantener'; if(net<pedidos)decision='Comprar / reasignar urgente'; else if(cov<5)decision='Reabastecer'; else if(cov>8)decision='Sobrestock: activar venta'; return `<tr><td>${esc(v)}</td><td>${money(pedidos)}</td><td>${money(forecast)}</td><td>${money(net)}</td><td>${dec(cov,1)} sem</td><td>${decision.includes('urgente')?pill(decision,'red'):decision.includes('Sobrestock')?pill(decision,'yellow'):pill(decision,'green')}</td></tr>`}); $('sop_content').innerHTML=`<div class="kpi-grid">${kpi('Fill-rate pedidos firmes',pct(m.fillRate),'Valor cubierto / pedidos firmes',m.fillRate>=90?'good':m.fillRate>=75?'warn':'bad')}${kpi('Riesgos stockout',int(m.stockouts),'Variedades sin cobertura firme',m.stockouts?'bad':'good')}${kpi('Cobertura promedio',dec(m.coverage,1)+' sem','Meta 5–7 semanas',m.coverage>=5&&m.coverage<=7?'good':m.coverage>=3?'warn':'bad')}${kpi('Sobrestock potencial',int(m.overstock),'Cobertura >8 semanas',m.overstock?'warn':'good')}</div><div class="card"><h2>Decisión S&OP por variedad</h2>${table(['Variedad','Pedidos firmes','Forecast','Inventario neto','Cobertura','Decisión'],rows)}</div>`; }

  function renderCartera(){ const active=state.sub.cartera||'cuentas'; $('page-cartera').innerHTML=`${tabbar('cartera',[['cuentas','Cuentas por cobrar'],['score','Scoring cliente'],['dashboard','Dashboard cartera']])}<div id="cartera_content"></div>`; if(active==='cuentas')renderAccounts(); if(active==='score')renderScores(); if(active==='dashboard')renderCarteraDash(); }
  function renderAccounts(){ const d=data(); const rows=d.accounts.map(a=>{const overdue=a.paymentDate?0:Math.max(0,age(a.dueDate)); return `<tr><td>${esc(a.client)}</td><td>${money(a.amount)}</td><td>${esc(a.saleDate)}</td><td>${esc(a.dueDate)}</td><td>${a.paymentDate?pill('Cobrado','green'):overdue>60?pill(overdue+' días','red'):overdue>30?pill(overdue+' días','yellow'):pill(overdue+' días','blue')}</td><td>${esc(a.owner)}</td><td>${esc(a.promiseDate||'')}</td><td>${btns('account',a.id)}</td></tr>`}); $('cartera_content').innerHTML=`<div class="card"><h2>${state.editing.account?'Editar':'Nueva'} cuenta por cobrar</h2><div class="grid-4"><div><label>Cliente *</label><input id="ac_client"></div><div><label>Monto $</label><input id="ac_amount"></div><div><label>Fecha venta</label><input type="date" id="ac_saleDate"></div><div><label>Fecha vencimiento</label><input type="date" id="ac_dueDate"></div><div><label>Fecha pago</label><input type="date" id="ac_paymentDate"></div><div><label>Promesa de pago</label><input type="date" id="ac_promiseDate"></div><div><label>Responsable</label><input id="ac_owner"></div><div><label>Moneda</label><select id="ac_currency"><option>MXN</option><option>USD</option></select></div></div><label>Notas de cobranza</label><textarea id="ac_notes"></textarea><div class="actions"><button class="btn-primary" onclick="APP.saveAccount()">Guardar cuenta</button><button class="btn-secondary" onclick="APP.cancelEdit('account')">Limpiar</button></div></div><div class="card"><h2>Cuentas por cobrar</h2>${table(['Cliente','Monto','Venta','Vence','Aging','Responsable','Promesa','Acciones'],rows)}</div>`; if(state.editing.account)loadAccount(d.accounts.find(x=>eq(x.id,state.editing.account))); }
  function saveAccount(){ const id=state.editing.account||uid('CXC'); const obj={id,client:field('ac_client'),amount:n(field('ac_amount')),saleDate:field('ac_saleDate')||today(),dueDate:field('ac_dueDate'),paymentDate:field('ac_paymentDate'),promiseDate:field('ac_promiseDate'),owner:field('ac_owner'),currency:field('ac_currency'),notes:field('ac_notes')}; if(!obj.client){alert('Cliente es obligatorio.');return;} upsert(K.accounts,obj); state.editing.account=null; toast('Cuenta guardada'); render(); }
  function loadAccount(a){ if(!a)return; ['client','amount','saleDate','dueDate','paymentDate','promiseDate','owner','currency','notes'].forEach(k=>setVal('ac_'+k,a[k])); }
  function scoreCalc(){ const total=n(field('sc_antiguedad'))+n(field('sc_historial'))+n(field('sc_volumen'))+n(field('sc_referencias'))+n(field('sc_garantias'))-n(field('sc_riesgo')); const score=clamp(total,0,100); const banda=score>=80?'A':score>=60?'B':'C'; const plazo=banda==='A'?45:banda==='B'?30:15; return {score,banda,plazo}; }
  function renderScores(){ const d=data(); const rows=d.scores.map(s=>`<tr><td>${esc(s.client)}</td><td>${int(s.score)}</td><td>${pill(s.banda,s.banda==='A'?'green':s.banda==='B'?'yellow':'red')}</td><td>${s.plazo} días</td><td>${esc(s.updatedAt||'')}</td><td>${btns('score',s.id)}</td></tr>`); $('cartera_content').innerHTML=`<div class="card"><h2>${state.editing.score?'Editar':'Nuevo'} scoring A/B/C</h2><p class="muted">100 pts máximos. El riesgo estacional resta puntos. Regla sugerida: A 45 días, B 30 días, C contado/15 días y excepción documentada.</p><div class="grid-4"><div><label>Cliente *</label><input id="sc_client"></div><div><label>Antigüedad 0-20</label><input id="sc_antiguedad"></div><div><label>Historial pago 0-30</label><input id="sc_historial"></div><div><label>Volumen/ticket 0-15</label><input id="sc_volumen"></div><div><label>Referencias 0-15</label><input id="sc_referencias"></div><div><label>Garantías 0-20</label><input id="sc_garantias"></div><div><label>Riesgo estacional 0-30</label><input id="sc_riesgo"></div></div><div class="actions"><button class="btn-primary" onclick="APP.previewScore()">Calcular</button><button class="btn-success" onclick="APP.saveScore()">Guardar score</button><button class="btn-secondary" onclick="APP.cancelEdit('score')">Limpiar</button></div><div id="sc_preview" style="margin-top:12px"></div></div><div class="card"><h2>Scores guardados</h2>${table(['Cliente','Score','Banda','Plazo','Actualizado','Acciones'],rows)}</div>`; if(state.editing.score)loadScore(d.scores.find(x=>eq(x.id,state.editing.score))); }
  function previewScore(){ const c=scoreCalc(); $('sc_preview').innerHTML=`<div class="kpi-grid">${kpi('Score crediticio',int(c.score),'Mínimo recomendado 50',c.score>=80?'good':c.score>=60?'warn':'bad')}${kpi('Banda',c.banda,`Plazo sugerido ${c.plazo} días`,c.banda==='A'?'good':c.banda==='B'?'warn':'bad')}</div>`; }
  function saveScore(){ const c=scoreCalc(); const id=state.editing.score||uid('SCR'); const obj={id,client:field('sc_client'),antiguedad:n(field('sc_antiguedad')),historial:n(field('sc_historial')),volumen:n(field('sc_volumen')),referencias:n(field('sc_referencias')),garantias:n(field('sc_garantias')),riesgo:n(field('sc_riesgo')),...c,updatedAt:now()}; if(!obj.client){alert('Cliente es obligatorio.');return;} upsert(K.scores,obj); state.editing.score=null; toast('Score guardado'); render(); }
  function loadScore(s){ if(!s)return; ['client','antiguedad','historial','volumen','referencias','garantias','riesgo'].forEach(k=>setVal('sc_'+k,s[k])); previewScore(); }
  function renderCarteraDash(){ const c=calcCartera(); const total=c.total||1; const rows=[['0-30',c.aging.a0,'blue'],['31-60',c.aging.a30,'yellow'],['61-90',c.aging.a60,'red'],['90+',c.aging.a90,'red']].map(x=>`<tr><td>${x[0]}</td><td>${money(x[1])}</td><td>${pct(x[1]/total*100)}</td><td><div class="progress"><span style="width:${Math.min(100,x[1]/total*100)}%"></span></div></td></tr>`); $('cartera_content').innerHTML=`<div class="kpi-grid">${kpi('Cartera abierta',money(c.total),'CxC sin fecha de pago','info')}${kpi('DSO estimado',dec(c.dso,0)+' días','Meta ≤45',c.dso<=45?'good':c.dso<=60?'warn':'bad')}${kpi('% Cartera 60+',pct(c.pct60),'Meta ≤10%',c.pct60<=10?'good':c.pct60<=20?'warn':'bad')}${kpi('Clientes bloqueables',int(c.blocked),'>60 días sin pago',c.blocked?'bad':'good')}</div><div class="card"><h2>Aging de cartera</h2>${table(['Rango','Saldo','%','Visual'],rows)}<div class="notice ${c.pct60>10?'bad':'good'}"><b>Regla:</b> cliente con saldo vencido mayor a 60 días queda bloqueado para nuevo surtido salvo plan de pago firmado y autorizado.</div></div>`; }

  function renderInteligencia(){ const d=data(); const latest=latestResultsByTrial(); const byVar={}; d.trials.forEach(t=>{const v=t.variedad||'Sin variedad'; byVar[v]=byVar[v]||{trials:0,roi:[],mejora:[],sales:0,leads:0,quality:[],facilidad:[],regions:new Set()}; byVar[v].trials++; byVar[v].regions.add(t.region||''); const r=latest[t.id]; if(r){byVar[v].roi.push(r.roiPct);byVar[v].mejora.push(r.mejoraPct);byVar[v].quality.push(n(r.calidad)*20);byVar[v].facilidad.push(n(r.facilidad)*20);} const leads=d.leads.filter(l=>eq(l.trialId,t.id)); byVar[v].leads+=leads.length; byVar[v].sales+=sum(leads.filter(leadIsClosed).map(l=>l.ticket)); });
    const rows=Object.entries(byVar).map(([v,x])=>{const score=innovationScore(x); return `<tr><td>${esc(v)}</td><td>${int(x.trials)}</td><td>${pct(avg(x.roi))}</td><td>${pct(avg(x.mejora))}</td><td>${int(x.leads)}</td><td>${money(x.sales)}</td><td>${pct(score)}</td><td>${score>=75?pill('Escalar','green'):score>=50?pill('Validar más','yellow'):pill('Descartar/ajustar','red')}</td></tr>`}).sort((a,b)=>String(b).localeCompare(String(a)));
    $('page-inteligencia').innerHTML=`<div class="split"><div class="card"><h2>Ranking de variedades</h2>${table(['Variedad','Ensayos','ROI prom.','Mejora','Leads','Venta cobrada','Índice','Decisión'],rows)}</div><div class="card"><h2>Radar de innovación</h2><div class="svg-box">${radarSvg(byVar)}</div><p class="small muted">Índice ponderado: ROI 25%, mejora/rendimiento 25%, calidad 20%, conversión/adopción 20%, facilidad 10%.</p></div></div><div class="card"><h2>Mapa estratégico de ensayos</h2><div id="intelMap" class="map"></div></div>`; setTimeout(()=>{const old=$('fieldMap'); initIntelMap();},50); }
  function innovationScore(x){ const roi=clamp(avg(x.roi),0,100); const rendimiento=clamp(avg(x.mejora)*4,0,100); const calidad=clamp(avg(x.quality),0,100); const conversion=x.trials?clamp((x.leads/x.trials)*20,0,100):0; const facilidad=clamp(avg(x.facilidad),0,100); return roi*.25+rendimiento*.25+calidad*.20+conversion*.20+facilidad*.10; }
  function radarSvg(byVar){ const entries=Object.entries(byVar).slice(0,3); const labels=['ROI','Rend.','Calidad','Conv.','Facilidad']; const cx=180,cy=170,R=120; let grid=''; for(let r=1;r<=5;r++){const rr=R*r/5; const pts=labels.map((_,i)=>{const a=-Math.PI/2+i*2*Math.PI/labels.length; return `${cx+Math.cos(a)*rr},${cy+Math.sin(a)*rr}`}).join(' '); grid+=`<polygon points="${pts}" fill="none" stroke="#334155"/>`; } labels.forEach((lab,i)=>{const a=-Math.PI/2+i*2*Math.PI/labels.length; grid+=`<line x1="${cx}" y1="${cy}" x2="${cx+Math.cos(a)*R}" y2="${cy+Math.sin(a)*R}" stroke="#334155"/><text x="${cx+Math.cos(a)*(R+24)}" y="${cy+Math.sin(a)*(R+24)}" fill="#9aa8bb" font-size="12" text-anchor="middle">${lab}</text>`}); const colors=['#38bdf8','#22c55e','#a78bfa']; const polys=entries.map(([v,x],idx)=>{const vals=[clamp(avg(x.roi),0,100),clamp(avg(x.mejora)*4,0,100),clamp(avg(x.quality),0,100),x.trials?clamp((x.leads/x.trials)*20,0,100):0,clamp(avg(x.facilidad),0,100)]; const pts=vals.map((val,i)=>{const a=-Math.PI/2+i*2*Math.PI/labels.length, rr=R*val/100; return `${cx+Math.cos(a)*rr},${cy+Math.sin(a)*rr}`}).join(' '); return `<polygon points="${pts}" fill="${colors[idx]}33" stroke="${colors[idx]}" stroke-width="2"/><text x="20" y="${25+idx*20}" fill="${colors[idx]}" font-size="13">${esc(v)}</text>`}).join(''); return `<svg width="380" height="340" viewBox="0 0 380 340">${grid}${polys}</svg>`; }
  function initIntelMap(){ const el=$('intelMap'); if(!el||!window.L)return; const map=L.map(el).setView([24.2,-102.5],5); L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19}).addTo(map); const d=data(); const latest=latestResultsByTrial(); let pts=[]; d.trials.forEach(t=>{const p=parseGPS(t.gps); if(p){const r=latest[t.id]; const color=r&&n(r.roiPct)>=30?'green':r&&n(r.roiPct)>=0?'orange':'red'; const marker=L.circleMarker(p,{radius:8,color,fillColor:color,fillOpacity:.75}).addTo(map).bindPopup(`<b>${esc(t.variedad)}</b><br>${esc(t.cultivo)} · ${esc(t.region)}<br>ROI: ${r?pct(r.roiPct):'Sin resultado'}`); pts.push(marker);}}); if(pts.length){const group=L.featureGroup(pts); map.fitBounds(group.getBounds().pad(.2));} setTimeout(()=>map.invalidateSize(),100); }

  function renderCalidad(){ const q=qualityAudit(); $('page-calidad').innerHTML=`<div class="kpi-grid">${kpi('Calidad de datos',pct(q.score,0),'100 = sistema conectado',clsScore(q.score,80,60))}${kpi('Alertas críticas',int(q.alerts.filter(a=>a.sev==='bad').length),'Acción inmediata','bad')}${kpi('Alertas preventivas',int(q.alerts.filter(a=>a.sev==='warn').length),'Revisar en comité','warn')}</div><div class="card"><h2>Reglas anti-dispersión del sistema</h2><div class="notice info"><b>Todo ensayo debe tener:</b> objetivo medible, control, proveedor/control, productor, ubicación, evidencia, costo, resultado económico, vínculo comercial y salida de mercado. Si pasa 60 días activo sin evidencia, se marca como alerta.</div><hr><div class="badge-row">${pill('Sin evidencia = inválido','red')}${pill('ROI negativo = no repetir','red')}${pill('Exitoso = receta comercial','green')}${pill('Terminado sin lead = fuga','yellow')}${pill('Sin mercado objetivo = dato incompleto','yellow')}</div></div><div class="card"><h2>Hallazgos de auditoría</h2>${q.alerts.map(a=>`<div class="notice ${a.sev}"><b>${esc(a.area)}:</b> ${esc(a.msg)}<br><span class="small">Acción sugerida: ${esc(a.action)}</span></div>`).join('')||'<div class="notice good">Sin hallazgos relevantes.</div>'}</div><div class="card"><h2>Variables depuradas y coherencia</h2><div class="grid-2"><div class="notice info"><b>ROI único:</b> todo ROI se calcula como porcentaje: (margen incremental – costo) / costo × 100.</div><div class="notice info"><b>Producción adicional:</b> diferencia ton/ha × 1,000 × hectáreas evaluadas.</div><div class="notice info"><b>Pipeline único:</b> eventos, ensayos y leads manuales entran al mismo embudo.</div><div class="notice info"><b>Resultado completo:</b> solo es completo cuando llega a cobro, no solo a factura.</div></div></div>`; }
