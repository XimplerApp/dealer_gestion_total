<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Galera RICO — Sistema Integral Comercial Agro</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<style>
:root{
  --bg:#0f172a;--shell:#0b1220;--panel:#111827;--card:#1e293b;--card2:#172033;--line:#334155;
  --text:#e2e8f0;--muted:#94a3b8;--primary:#38bdf8;--green:#22c55e;--yellow:#facc15;--orange:#f59e0b;--red:#ef4444;
  --purple:#a78bfa;--blue:#60a5fa;--shadow:0 14px 35px rgba(0,0,0,.24)
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{margin:0;background:var(--bg);color:var(--text);font-family:Arial,Helvetica,sans-serif;font-size:14px}
button,input,select,textarea{font-family:inherit}
.app{min-height:100vh;display:grid;grid-template-columns:270px 1fr}
.sidebar{background:rgba(11,18,32,.98);border-right:1px solid var(--line);position:sticky;top:0;height:100vh;overflow:auto;padding:20px 14px;z-index:10}
.logo{padding:6px 10px 18px;border-bottom:1px solid var(--line);margin-bottom:14px}
.logo h1{font-size:20px;line-height:1.15;color:var(--primary);margin:0 0 8px;font-weight:900}
.logo p{margin:0;color:var(--muted);line-height:1.35;font-size:12px}
.nav-section{color:#64748b;text-transform:uppercase;letter-spacing:.08em;font-size:11px;font-weight:800;margin:16px 10px 6px}
.nav button{width:100%;display:flex;align-items:center;gap:9px;background:transparent;color:var(--muted);border:none;border-left:3px solid transparent;border-radius:8px;padding:11px 10px;text-align:left;cursor:pointer;font-weight:800;margin:2px 0}
.nav button:hover,.nav button.active{background:rgba(56,189,248,.09);color:var(--text);border-left-color:var(--primary)}
.main{padding:24px;max-width:1500px;width:100%;margin:0 auto}
.topline{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;flex-wrap:wrap;margin-bottom:18px;background:linear-gradient(135deg,rgba(30,41,59,.96),rgba(15,23,42,.96));border:1px solid var(--line);border-radius:18px;padding:22px;box-shadow:var(--shadow)}
.topline h2{margin:0;color:var(--primary);font-size:26px}
.topline p{margin:8px 0 0;color:var(--muted);max-width:900px;line-height:1.45}.page{display:none}.page.active{display:block}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px;margin-bottom:18px;box-shadow:0 8px 22px rgba(0,0,0,.18)}
.card h2,.card h3{margin-top:0;color:var(--primary)}.card h2{font-size:20px}.card h3{font-size:16px}.muted{color:var(--muted)}.small{font-size:12px}.help{font-size:12px;color:var(--muted);line-height:1.45;margin:3px 0 8px}.danger-text{color:#fecaca}.green{color:var(--green)}.yellow{color:var(--yellow)}.red{color:var(--red)}.blue{color:var(--primary)}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px}.grid-2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}.grid-3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px}.grid-4{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px}.grid-5{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:12px}
label{display:block;color:var(--muted);font-size:12px;font-weight:800;margin:8px 0 4px}input,select,textarea{width:100%;padding:10px;border-radius:9px;border:1px solid var(--line);background:#0f172a;color:var(--text);outline:none}input:focus,select:focus,textarea:focus{border-color:var(--primary)}textarea{resize:vertical;min-height:70px}.light-input{background:white;color:#111827}
.actions{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-top:13px}.actions button{width:auto}.btn,button{border:none;border-radius:9px;padding:10px 13px;font-weight:900;cursor:pointer}.btn-primary{background:var(--primary);color:#062033}.btn-success{background:var(--green);color:#052e16}.btn-warning{background:var(--orange);color:#111827}.btn-danger{background:var(--red);color:white}.btn-secondary{background:#111827;color:var(--text);border:1px solid var(--line)}.btn-purple{background:var(--purple);color:#1e1b4b}.btn-sm{font-size:12px;padding:7px 9px}.btn-ghost{background:transparent;border:1px solid var(--line);color:var(--muted)}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(165px,1fr));gap:12px}.kpi{background:#0b1220;border:1px solid var(--line);border-radius:14px;padding:14px}.kpi .label{color:var(--muted);font-size:12px;font-weight:800;line-height:1.25}.kpi .value{font-size:24px;font-weight:900;margin-top:8px}.kpi .sub{color:var(--muted);font-size:12px;margin-top:6px;line-height:1.3}.kpi.good{border-left:4px solid var(--green)}.kpi.warn{border-left:4px solid var(--yellow)}.kpi.bad{border-left:4px solid var(--red)}.kpi.info{border-left:4px solid var(--primary)}
.table-wrap{overflow:auto;border-radius:12px;border:1px solid var(--line);margin-top:12px}table{width:100%;border-collapse:collapse;font-size:13px}th,td{padding:9px 10px;border-bottom:1px solid var(--line);vertical-align:top;text-align:left}th{background:#0b1220;color:var(--primary);font-size:12px;white-space:nowrap}tr:hover td{background:rgba(255,255,255,.025)}td .actions{margin:0}.center{text-align:center}.nowrap{white-space:nowrap}
.pill{display:inline-block;padding:4px 9px;border-radius:999px;font-size:12px;font-weight:900;border:1px solid var(--line);background:#0b1220;color:var(--muted)}.pill-green{background:rgba(34,197,94,.14);color:var(--green);border-color:rgba(34,197,94,.4)}.pill-yellow{background:rgba(250,204,21,.14);color:var(--yellow);border-color:rgba(250,204,21,.4)}.pill-red{background:rgba(239,68,68,.14);color:#fca5a5;border-color:rgba(239,68,68,.4)}.pill-blue{background:rgba(56,189,248,.14);color:var(--primary);border-color:rgba(56,189,248,.4)}.pill-purple{background:rgba(167,139,250,.14);color:var(--purple);border-color:rgba(167,139,250,.4)}
.tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}.tabs button{background:#0b1220;color:var(--muted);border:1px solid var(--line)}.tabs button.active{background:var(--primary);color:#062033;border-color:var(--primary)}.subpanel{display:none}.subpanel.active{display:block}
.notice{background:#0b1220;border:1px solid var(--line);border-radius:12px;padding:13px;line-height:1.45}.alert{border-left:4px solid var(--yellow);background:#1b1606;color:#fde68a}.alert.red{border-left-color:var(--red);background:#2a1014;color:#fecaca}.alert.green{border-left-color:var(--green);background:#082713;color:#bbf7d0}.split{display:grid;grid-template-columns:1.2fr .8fr;gap:14px}.section-title{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
.map{height:380px;border-radius:14px;border:1px solid var(--line);overflow:hidden}.timeline-item{background:#0b1220;border:1px solid var(--line);border-radius:13px;padding:14px;margin-bottom:12px}.timeline-item img{max-width:260px;border-radius:10px;border:1px solid var(--line);display:block;margin-top:8px}.bar{height:8px;background:#111827;border-radius:99px;overflow:hidden;border:1px solid var(--line)}.bar span{display:block;height:100%;background:var(--primary);width:0}.score-range{display:grid;grid-template-columns:190px 1fr 42px;gap:10px;align-items:center;margin-bottom:10px}.score-range input{padding:0}.svg-box{background:#0b1220;border:1px solid var(--line);border-radius:13px;padding:12px;min-height:300px}.svg-box svg{max-width:100%;height:auto;display:block;margin:auto}.two-col-list{columns:2;column-gap:24px}.hidden{display:none!important}hr{border:none;border-top:1px solid var(--line);margin:14px 0}.toast{position:fixed;right:20px;bottom:20px;background:#0b1220;color:var(--text);border:1px solid var(--line);padding:12px 15px;border-radius:12px;box-shadow:var(--shadow);z-index:9999;opacity:0;transform:translateY(12px);transition:.25s}.toast.show{opacity:1;transform:translateY(0)}
@media(max-width:1050px){.app{grid-template-columns:1fr}.sidebar{position:relative;height:auto}.split,.grid-2,.grid-3,.grid-4,.grid-5{grid-template-columns:1fr}.score-range{grid-template-columns:1fr}.actions button{width:100%}.main{padding:14px}.two-col-list{columns:1}.sidebar .nav{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:4px}.nav-section{grid-column:1/-1}.sidebar{padding:12px}}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="logo">
      <h1>🌾 Galera RICO<br>Sistema Integral</h1>
      <p>Ensayos · Eventos · Leads · S&OP · Cartera · Crédito · Dashboard Ejecutivo</p>
    </div>
    <div class="nav" id="nav"></div>
  </aside>
  <main class="main">
    <div class="topline">
      <div>
        <h2 id="pageTitle">Dashboard Integral</h2>
        <p id="pageSub">Una sola herramienta operativa para conectar campo, marketing, venta, inventario, crédito, cobranza y decisión ejecutiva.</p>
      </div>
      <div class="actions" style="margin:0">
        <button class="btn-secondary" onclick="APP.renderCurrent()">🔄 Recalcular</button>
        <button class="btn-success" onclick="APP.exportAll()">📤 Exportar todo</button>
      </div>
    </div>

    <section id="page-dashboard" class="page"></section>
    <section id="page-ensayos" class="page"></section>
    <section id="page-bitacora" class="page"></section>
    <section id="page-resultados" class="page"></section>
    <section id="page-tableroensayos" class="page"></section>
    <section id="page-inteligencia" class="page"></section>
    <section id="page-innovacion" class="page"></section>
    <section id="page-pipeline" class="page"></section>
    <section id="page-eventos" class="page"></section>
    <section id="page-sop" class="page"></section>
    <section id="page-cartera" class="page"></section>
    <section id="page-exportar" class="page"></section>
  </main>
</div>
<div id="toast" class="toast"></div>
<script>
const APP = (()=>{
  const state = { page:'dashboard', editing:{ensayo:null, bitacora:null, resultado:null, oportunidad:null, evento:null, lead:null, cobro:null, workflow:null, cliente:null, score:null, cuenta:null, pago:null, promesa:null, demanda:null, inventario:null}, maps:{}, currentCalc:null };
  const pages = [
    ['dashboard','📊','Dashboard Integral','Visión ejecutiva conectada: ensayos, eventos, pipeline único, S&OP, cartera y alertas.','Principal'],
    ['ensayos','🧪','Ensayos','Registro técnico-comercial de ensayos con importador Galera/AppSheet y reglas de control.','Campo'],
    ['bitacora','📸','Bitácora','Evidencia técnica con fotos, hallazgos, severidad, acciones correctivas y GPS.','Campo'],
    ['resultados','📈','Resultados & ROI','Evaluaciones técnicas, costos, margen incremental, ROI y recomendación comercial.','Campo'],
    ['tableroensayos','🧠','Tablero de Ensayos','KPIs técnicos, comerciales y estratégicos del sistema de ensayos.','Campo'],
    ['inteligencia','🚀','Inteligencia de Mercado','Mapa, ranking regional, adopción, zonas, RICE y señales de mercado.','Dirección'],
    ['innovacion','🧬','Innovación Varietal','Radar, pesos configurables, benchmark vs control y decisiones de portafolio.','Dirección'],
    ['pipeline','🌱','Pipeline Comercial Único','Unifica oportunidades originadas por ensayos, eventos, demos o captura manual, hasta venta y cartera.','Comercial'],
    ['eventos','🎪','Eventos GO/NO-GO','Scorecard, leads y workflow SLA de eventos. El cobro final fluye a Pipeline/Cartera.','Comercial'],
    ['sop','📦','S&OP Agro','Demanda, pedidos firmes, inventario, cobertura, sobrestock y proyección por variedad.','Operación'],
    ['cartera','💳','Cartera & Crédito','Clientes, scoring, cuentas, promesas, pagos, reglas, cobranza y cost to collect.','Finanzas'],
    ['exportar','📤','Exportar / Respaldo','Exportación integral y mantenimiento de datos locales.','Sistema']
  ];  const K = {ensayos:'ensayos',bitacora:'bitacora',resultados:'resultados',oportunidades:'oportunidades',eventos:'eventos',leads:'leads',cobranza:'cobranza',workflow:'workflow',sopDemanda:'sop_demanda',sopInv:'sop_inventario',sopProy:'sop_proyecciones',clientes:'clientes',scores:'scores',cuentas:'cuentas',promesas:'promesas',pagos:'pagos',costos:'costos',pesos:'innovacion_pesos'};
  const $ = id => document.getElementById(id);
  const q = (sel,root=document) => root.querySelector(sel);
  const qa = (sel,root=document) => [...root.querySelectorAll(sel)];
  const esc = s => String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));
  const read = (key,def=[]) => {try{return JSON.parse(localStorage.getItem(key)) ?? def}catch(e){return def}};
  const write = (key,val) => localStorage.setItem(key, JSON.stringify(val));
  const uid = (p='ID') => p + '-' + Date.now().toString(36) + '-' + Math.random().toString(36).slice(2,7).toUpperCase();
  const n = v => { if(v===null||v===undefined||v==='') return 0; if(typeof v==='number') return isFinite(v)?v:0; const x=String(v).replace(/[$,%\s]/g,'').replace(/,/g,''); return parseFloat(x)||0; };
  const money = v => '$' + n(v).toLocaleString('es-MX',{minimumFractionDigits:0,maximumFractionDigits:0});
  const dec = (v,d=2) => n(v).toLocaleString('es-MX',{minimumFractionDigits:d,maximumFractionDigits:d});
  const pct = (v,d=1) => (isFinite(n(v))?n(v):0).toLocaleString('es-MX',{minimumFractionDigits:d,maximumFractionDigits:d}) + '%';
  const int = v => Math.round(n(v)).toLocaleString('es-MX');
  const today = () => new Date().toISOString().slice(0,10);
  const nowNice = () => new Date().toLocaleString('es-MX');
  const toDate = d => d ? new Date(String(d).includes('T')?d:(d+'T12:00:00')) : null;
  const daysBetween = (a,b) => {const da=toDate(a), db=toDate(b); if(!da||!db) return null; return Math.round((db-da)/86400000)};
  const daysFromToday = d => daysBetween(today(), d);
  const ageDays = d => daysBetween(d, today());
  const avg = arr => arr.length ? arr.reduce((a,b)=>a+n(b),0)/arr.length : 0;
  const sum = arr => arr.reduce((a,b)=>a+n(b),0);
  const clamp = (v,min=0,max=100)=>Math.max(min,Math.min(max,n(v)));
  const get = key => read(key, []);
  const save = (key,val) => write(key,val);
  const toast = msg => { const t=$('toast'); if(!t)return; t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2300); };
  const eq = (a,b)=>String(a)===String(b);
  const norm = s => String(s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/g,'_').replace(/^_|_$/g,'');
  const latestBy = (arr, idKey, dateKey='fechaEvaluacion') => {
    const m={}; arr.forEach(x=>{const id=String(x[idKey]||''); if(!id)return; if(!m[id] || String(x[dateKey]||x.fecha||'')>String(m[id][dateKey]||m[id].fecha||'')) m[id]=x;}); return m;
  };
  const ensayoLabel = e => e ? `${e.id} · ${e.cultivo||'Cultivo'} · ${e.variedad_tratada||e.variedadTratada||'Variedad'} · ${e.productor||'Productor'}` : 'Ensayo no encontrado';
  const eventLabel = e => e ? `${e.id} · ${e.evento||e.nombre||'Evento'} · ${e.zona||''}` : 'Evento no encontrado';
  const selectOptions = (arr, labelFn, value='id', empty='Selecciona') => `<option value="">${empty}</option>` + arr.map(x=>`<option value="${esc(x[value])}">${esc(labelFn(x))}</option>`).join('');
  const safeSet = (id,val)=>{const el=$(id); if(el) el.value=val??''};
  const fieldVal = id => ($(id)?.value ?? '').trim();

  function statusPill(text,type='blue'){ return `<span class="pill pill-${type}">${esc(text)}</span>`; }
  function semaforo(value, good=75, warn=50){ value=n(value); if(value>=good) return 'green'; if(value>=warn) return 'yellow'; return 'red'; }
  function kpi(label,value,sub='',cls='info'){ return `<div class="kpi ${cls}"><div class="label">${label}</div><div class="value">${value}</div>${sub?`<div class="sub">${sub}</div>`:''}</div>`; }
  function btns(entity,id){return `<div class="actions"><button class="btn-warning btn-sm" onclick="APP.edit('${entity}','${esc(id)}')">✏️ Editar</button><button class="btn-danger btn-sm" onclick="APP.del('${entity}','${esc(id)}')">🗑 Eliminar</button></div>`;}
  function table(headers, rows){return `<div class="table-wrap"><table><thead><tr>${headers.map(h=>`<th>${h}</th>`).join('')}</tr></thead><tbody>${rows.length?rows.join(''):`<tr><td colspan="${headers.length}" class="center muted">Sin registros todavía.</td></tr>`}</tbody></table></div>`;}

  function buildNav(){
    const groups = {};
    pages.forEach(p=>{groups[p[4]] = groups[p[4]] || []; groups[p[4]].push(p);});
    $('nav').innerHTML = Object.entries(groups).map(([g,items])=>`<div class="nav-section">${g}</div>` + items.map(p=>`<button id="nav-${p[0]}" onclick="APP.show('${p[0]}')"><span>${p[1]}</span>${p[2]}</button>`).join('')).join('');
  }
  function show(page){
    state.page=page;
    qa('.page').forEach(x=>x.classList.remove('active'));
    qa('.nav button').forEach(x=>x.classList.remove('active'));
    $(`page-${page}`)?.classList.add('active'); $(`nav-${page}`)?.classList.add('active');
    const meta=pages.find(p=>p[0]===page); $('pageTitle').textContent=meta?.[2]||''; $('pageSub').textContent=meta?.[3]||'';
    renderCurrent();
    window.scrollTo({top:0,behavior:'smooth'});
  }
  function renderCurrent(){ const fn = ({dashboard:renderDashboard,ensayos:renderEnsayos,bitacora:renderBitacora,resultados:renderResultados,tableroensayos:renderTableroEnsayos,inteligencia:renderInteligencia,innovacion:renderInnovacion,pipeline:renderPipeline,eventos:renderEventos,sop:renderSOP,cartera:renderCartera,exportar:renderExportar})[state.page]; if(fn) fn(); }

  function getEnsayos(){return get(K.ensayos).map(e=>({...e,id:e.id||uid('ENS'),fecha_siembra:e.fecha_siembra||e.fechaSiembra||e.siembra||'',fecha_cosecha:e.fecha_cosecha||e.fechaCosecha||e.cosecha||'',variedad_tratada:e.variedad_tratada||e.variedadTratada||e.variedad||'',variedad_control:e.variedad_control||e.variedadControl||'',proveedor_control:e.proveedor_control||e.proveedor||'',ubicacion:e.ubicacion||e.gps||''}));}
  function saveEnsayos(a){save(K.ensayos,a)}
  function getResultados(){return get(K.resultados)}
  function getOportunidades(){return get(K.oportunidades)}
  function getEventos(){return get(K.eventos)}
  function getLeads(){return get(K.leads)}
  function getCobranza(){return get(K.cobranza)}
  function getWorkflow(){return get(K.workflow)}
  function getClientes(){return get(K.clientes)}
  function getScores(){return get(K.scores)}
  function getCuentas(){return get(K.cuentas)}
  function getPagos(){return get(K.pagos)}
  function getPromesas(){return get(K.promesas)}

  function renderDashboard(){
    const ens=getEnsayos(), bit=get(K.bitacora), res=getResultados(), opp=getOportunidades(), eventos=getEventos(), leads=getLeads(), cob=getCobranza();
    const latest=latestBy(res,'ensayo_id'); const roiVals=Object.values(latest).map(r=>n(r.roi));
    const ventasEns=sum(opp.map(o=>o.ventaCerrada)); const ensayosVenta=new Set(opp.filter(o=>n(o.ventaCerrada)>0).map(o=>String(o.ensayo_id||o.idEnsayo))).size;
    const conversionEns=ens.length?ensayosVenta/ens.length*100:0;
    const go=eventos.filter(e=>e.decision==='GO').length; const pipelineLeads=sum(leads.map(l=>l.ticket)); const cobrado=sum(cob.map(c=>c.estado==='Cobrado'?c.monto:0));
    const cartera=calcCartera(); const sop=calcSOPDashboard();
    const alertas = buildGlobalAlerts();
    $('page-dashboard').innerHTML = `
      <div class="kpi-grid">
        ${kpi('Ensayos registrados',int(ens.length),`${ens.filter(e=>e.estado==='Activo').length} activos`,'info')}
        ${kpi('ROI promedio ensayos',pct(avg(roiVals)),`Meta ≥ 30%`, avg(roiVals)>=30?'good':avg(roiVals)>=0?'warn':'bad')}
        ${kpi('Conversión ensayo → venta',pct(conversionEns),`${ensayosVenta} ensayos con venta cerrada` , conversionEns>=25?'good':conversionEns>=10?'warn':'bad')}
        ${kpi('Eventos GO',int(go),`${eventos.length} evaluados`,go?'good':'warn')}
        ${kpi('Leads eventos',int(leads.length),`Pipeline estimado ${money(pipelineLeads)}`,'info')}
        ${kpi('Cobrado eventos',money(cobrado),`Desde registros de cobranza`,'good')}
        ${kpi('DSO estimado',`${dec(cartera.dso,0)} días`,`Meta ≤ 45 días`, cartera.dso<=45?'good':cartera.dso<=60?'warn':'bad')}
        ${kpi('Fill-rate S&OP',pct(sop.fillRate),`Pedidos firmes cubiertos`, sop.fillRate>=90?'good':sop.fillRate>=70?'warn':'bad')}
      </div>
      <div class="split" style="margin-top:18px">
        <div class="card"><h2>🚨 Alertas críticas integradas</h2>${alertas.length?alertas.map(a=>`<div class="notice ${a.type}">${a.msg}</div>`).join(''):'<div class="notice green">Sin alertas críticas con la información actual.</div>'}</div>
        <div class="card"><h2>🔗 Flujo operativo integrado</h2><div class="notice">Ensayo → Evidencia → Resultado/ROI → Oportunidad → Venta → Cobro → Feedback → S&OP → Decisión ejecutiva.</div><hr><ul class="muted"><li>Eventos y días de campo usan Scorecard GO/NO-GO antes de invertir.</li><li>Leads y oportunidades quedan ligados a eventos o ensayos.</li><li>S&OP separa pedidos firmes de pipeline para no fallar a clientes actuales.</li><li>Cartera bloquea crédito con score menor a 50 o mora crítica.</li></ul></div>

  function calcSOP(show=false){ const variedad=fieldVal('sopc_variedad'), d=get(K.sopDemanda).find(x=>x.variedad===variedad), inv=get(K.sopInv).filter(x=>x.variedad===variedad); const invN=sum(inv.map(x=>x.disponible-x.comprometido+x.transito)); const pedidos=n(d?.pedidos), base=n(d?.ventas)*(1+n(fieldVal('sopc_growth'))/100), pipe=n(d?.pipeline)*n(fieldVal('sopc_probPipeline'))/100, leads=n(d?.leads)*n(fieldVal('sopc_ticket'))*n(fieldVal('sopc_probLeads'))/100; const forecast=base+pedidos+pipe+leads; const total=forecast*(1+n(fieldVal('sopc_seguridad'))/100); const semanal=total/(n(fieldVal('sopc_semanas'))||12); const cobertura=semanal?invN/semanal:0; let decision='Equilibrado'; if(invN<pedidos)decision='CRÍTICO: no cubre pedidos firmes'; else if(invN<total)decision='Comprar / reabastecer'; else if(invN>total*1.4)decision='Sobrestock: ajustar compras o activar venta'; const obj={id:uid('PROY'),fecha:today(),variedad,baseHistorica:base,pedidosFirmes:pedidos,pipelinePonderado:pipe,leadsPonderados:leads,forecastTotal:total,inventarioNeto:invN,coberturaSemanas:cobertura,decision}; state.currentSOP=obj; if(show)$('sop_calc').innerHTML=`<div class="kpi-grid">${kpi('Pedidos firmes',money(pedidos),'Prioridad 1','info')}${kpi('Pipeline ponderado',money(pipe),'Probabilidad configurable','info')}${kpi('Leads ponderados',money(leads),'Ticket × conversión','info')}${kpi('Forecast + seguridad',money(total),'Demanda planeada','info')}${kpi('Inventario neto',money(invN),'Disponible - comprometido + tránsito',invN>=pedidos?'good':'bad')}${kpi('Cobertura',dec(cobertura,1)+' sem','Meta 5–7 semanas',cobertura>=5&&cobertura<=7?'good':cobertura>=3?'warn':'bad')}${kpi('Decisión',decision,'Regla S&OP',decision.includes('CRÍTICO')?'bad':decision.includes('Sobrestock')?'warn':'good')}</div>`; return obj; }

  function calcSOPDashboard(){ const d=get(K.sopDemanda), inv=get(K.sopInv); let pedidos=0, cubierto=0, stockoutRisk=0, invNeto=0; d.forEach(x=>{const invN=sum(inv.filter(i=>i.variedad===x.variedad).map(i=>i.disponible-i.comprometido+i.transito)); invNeto+=invN; pedidos+=n(x.pedidos); cubierto+=Math.min(invN,n(x.pedidos)); if(invN<n(x.pedidos))stockoutRisk++;}); return {pedidos,invNeto,stockoutRisk,fillRate:pedidos?cubierto/pedidos*100:0}; }

  function renderReglasCredito(){ const clientes=getClientes(), cuentas=getCuentas(); const rows=cuentas.map(c=>{const cli=clientes.find(x=>eq(x.id,c.cliente)); const score=scoreCliente(c.cliente); const saldo=saldoCuenta(c.id); const dias=diasHastaVencer(c); const bloqueo=(score<50)||(dias<-60&&saldo>0); return `<tr><td>${esc(cli?.nombre||'Cliente')}</td><td>${int(score)}</td><td>${money(saldo)}</td><td>${dias>=0?`Vence en ${dias} días`:`Vencida hace ${Math.abs(dias)} días`}</td><td>${bloqueo?statusPill('Bloquear / contado','red'):score>=70?statusPill('A · 45 días','green'):score>=50?statusPill('B · 30 días','yellow'):statusPill('Sin crédito','red')}</td></tr>`;}); $('sub-car-reglas').innerHTML=`<div class="card"><h2>Política mínima de crédito</h2><div class="notice"><b>Regla 1:</b> score menor a 50 = no crédito, contado o revisión directiva. <br><b>Regla 2:</b> plazo estándar máximo 90 días; plazos mayores solo Dirección. <br><b>Regla 3:</b> cartera >60 días sin promesa activa = bloqueo de surtido. <br><b>Regla 4:</b> comisiones deben validarse contra venta cobrada.</div></div><div class="card"><h2>Aplicación de reglas por cuenta</h2>${table(['Cliente','Score','Saldo','Vencimiento','Recomendación'],rows)}</div>`; }

  function calcCartera(){ const cuentas=getCuentas(), pagos=getPagos(), prom=getPromesas(); const saldos=cuentas.map(c=>({c,saldo:saldoCuenta(c.id),dias:diasHastaVencer(c)})).filter(x=>x.saldo>0); const total=sum(saldos.map(x=>x.saldo)); const venc60=sum(saldos.filter(x=>x.dias<-60).map(x=>x.saldo)); const ventas=sum(cuentas.map(c=>c.monto)); const daily=ventas/90||0; const dso=daily?total/daily:0; const pct60=total?venc60/total*100:0; const ptp=prom.length?prom.filter(p=>p.cumplido).length/prom.length*100:0; return {total,venc60,pct60,dso,ptp,cuentasActivas:saldos.length,pagos:sum(pagos.map(p=>p.monto))}; }
  function saldoCuenta(id){ const c=getCuentas().find(x=>eq(x.id,id)); if(!c)return 0; return Math.max(0,n(c.monto)-sum(getPagos().filter(p=>eq(p.cuenta,id)).map(p=>p.monto))); }
  function diasHastaVencer(c){ const fecha=toDate(c.fecha); if(!fecha)return 0; const v=new Date(fecha); v.setDate(v.getDate()+n(c.credito)); return Math.round((v-toDate(today()))/86400000); }
  function scoreCliente(id){ return getScores().find(s=>eq(s.cliente,id))?.total || 0; }

  function renderClientes(){ const clientes=getClientes(); const rows=clientes.map(c=>`<tr><td>${esc(c.nombre)}</td><td>${esc(c.rfc||'')}</td><td>${esc(c.tel||'')}</td><td>${esc(c.lugar||'')}</td><td>${esc(c.cultivo||'')}</td><td>${dec(c.ha,1)}</td><td>${btns('cliente',c.id)}</td></tr>`); $('sub-car-clientes').innerHTML=`<div class="card"><h2>${state.editing.cliente?'Editar':'Nuevo'} cliente</h2><div class="grid-3"><div><label>Nombre completo *</label><input id="cli_nombre"></div><div><label>RFC</label><input id="cli_rfc"></div><div><label>Teléfono</label><input id="cli_tel"></div><div><label>Municipio / Estado</label><input id="cli_lugar"></div><div><label>Cultivo principal</label><input id="cli_cultivo"></div><div><label>Hectáreas estimadas</label><input id="cli_ha"></div></div><label>Observaciones</label><textarea id="cli_obs"></textarea><div class="actions"><button class="btn-primary" onclick="APP.saveCliente()">💾 Guardar cliente</button><button class="btn-secondary" onclick="APP.resetForm('cliente')">🧹 Limpiar</button></div></div><div class="card"><h2>Lista de clientes</h2>${table(['Nombre','RFC','Teléfono','Lugar','Cultivo','Ha','Acciones'],rows)}</div>`; if(state.editing.cliente)loadClienteForm(clientes.find(c=>eq(c.id,state.editing.cliente))); }

  function renderScoring(){ const clientes=getClientes(), scores=getScores(); const rows=scores.map(s=>{const c=clientes.find(x=>eq(x.id,s.cliente)); return `<tr><td>${esc(c?.nombre||'Cliente')}</td><td>${int(s.total)}</td><td>${statusPill(s.banda,s.banda==='A'?'green':s.banda==='B'?'yellow':'red')}</td><td>${esc(s.recomendacion)}</td><td>${btns('score',s.id)}</td></tr>`;}); $('sub-car-scoring').innerHTML=`<div class="card"><h2>Scoring crediticio</h2><div><label>Cliente</label><select id="score_cliente">${selectOptions(clientes,c=>c.nombre,'id','Selecciona cliente')}</select></div>${scoreInput('antiguedad','Antigüedad relación años',20)}${scoreInput('referencias','Referencias comerciales',20)}${scoreInput('historial','Historial pago interno',25)}${scoreInput('ticket','Ticket promedio / volumen',15)}${scoreInput('riesgo','Perfil de riesgo general',10)}${scoreInput('garantias','Garantías / aval',10)}<div id="score_preview" class="notice">Score total: 0</div><div class="actions"><button class="btn-primary" onclick="APP.saveScore()">💾 Guardar score</button><button class="btn-secondary" onclick="APP.resetForm('score')">🧹 Limpiar</button></div></div><div class="card"><h2>Scores guardados</h2>${table(['Cliente','Score','Banda','Recomendación','Acciones'],rows)}</div>`; ['antiguedad','referencias','historial','ticket','riesgo','garantias'].forEach(id=>{const el=$('score_'+id); if(el)el.addEventListener('input',previewScore);}); if(state.editing.score)loadScoreForm(scores.find(s=>eq(s.id,state.editing.score))); }

odo','Acciones'],rowsP)}</div><div class="card"><h2>Promesas registradas</h2>${table(['Cliente','Monto','Fecha','Estado','Acciones'],rowsProm)}</div>`; if(state.editing.pago)loadPagoForm(pagos.find(p=>eq(p.id,state.editing.pago))); if(state.editing.promesa)loadPromesaForm(prom.find(p=>eq(p.id,state.editing.promesa))); }

        <div class="card"><h2>📡 Radar varietal</h2><div><label>Variedad</label><select id="rad_var" onchange="APP.renderRadar()">${selectOptions(port,v=>v.variedad,'variedad','Selecciona')}</select></div><div id="radar_box" class="svg-box" style="margin-top:12px"></div></div>
      </div>
      <div class="card"><h2>🧬 Portafolio varietal con benchmark</h2>${table(['Variedad','Ensayos','Mejora vs control','ROI','Ventas','Score','Decisión recomendada'],rows)}</div>
      <div class="card"><h2>Decisiones recomendadas</h2>${port.slice(0,6).map(v=>`<div class="notice ${v.score>=4?'green':v.score>=3?'alert':'red'}"><b>${esc(v.variedad)}:</b> ${esc(v.recomendacion)}. Score ${dec(v.score,2)} / 5, ROI ${pct(v.roi)}, mejora ${pct(v.mejora)}.</div>`).join('')||'<div class="notice">Aún no hay portafolio suficiente para decidir.</div>'}</div>`;
    loadWeights(); renderRadar();
  }
  function weights(){ return read(K.pesos,{rendimiento:25,roi:20,conversion:15,adopcion:15,sanidad:15,traccion:10}); }
  function loadWeights(){ const w=weights(); ['rendimiento','roi','conversion','adopcion','sanidad','traccion'].forEach(k=>safeSet('w_'+k,w[k])); const total=sum(Object.values(w)); if($('w_info'))$('w_info').textContent=`Total pesos: ${total}%. Se normalizan automáticamente si no suman 100.`; }

  function saveWeights(){ const w={rendimiento:n(fieldVal('w_rendimiento')),roi:n(fieldVal('w_roi')),conversion:n(fieldVal('w_conversion')),adopcion:n(fieldVal('w_adopcion')),sanidad:n(fieldVal('w_sanidad')),traccion:n(fieldVal('w_traccion'))}; save(K.pesos,w); toast('Pesos guardados'); renderInteligencia(); }
  function defaultWeights(){ save(K.pesos,{rendimiento:25,roi:20,conversion:15,adopcion:15,sanidad:15,traccion:10}); toast('Pesos restablecidos'); renderInteligencia(); }
  function varietyPortfolio(){ const ens=getEnsayos(), res=getResultados(), opp=getOportunidades(), w=weights(), wt=sum(Object.values(w))||100, latest=latestBy(res,'ensayo_id'); const map={}; ens.forEach(e=>{const v=e.variedad_tratada||'Sin variedad'; map[v]=map[v]||{variedad:v,ensayos:0,roiVals:[],ventas:0,leads:0,mejoraVals:[],sanidadVals:[],conv:0}; map[v].ensayos++; const r=latest[e.id]; if(r){map[v].roiVals.push(n(r.roi)); map[v].mejoraVals.push(n(r.mejoraPct)); map[v].sanidadVals.push(String(r.sanidadGeneral||'').toLowerCase().includes('muy')?5:String(r.sanidadGeneral||'').toLowerCase().includes('buena')?4:3);} const os=opp.filter(o=>eq(o.ensayo_id,e.id)); map[v].ventas+=sum(os.map(o=>o.ventaCerrada)); map[v].leads+=sum(os.map(o=>o.leads)); if(os.some(o=>n(o.ventaCerrada)>0))map[v].conv++; }); return Object.values(map).map(v=>{v.roi=avg(v.roiVals); v.mejora=avg(v.mejoraVals); v.sanidad=avg(v.sanidadVals)||3; const rendimiento=clamp((v.mejora+20)/40*5,1,5), roiScore=clamp((v.roi+20)/80*5,1,5), conversion=clamp((v.conv/Math.max(v.ensayos,1))*5,1,5), adopcion=clamp(v.ventas/100000*5,1,5), sanidad=v.sanidad, traccion=clamp(v.leads/20*5,1,5); v.dim={rendimiento,roi:roiScore,conversion,adopcion,sanidad,traccion}; v.score=(rendimiento*w.rendimiento+roiScore*w.roi+conversion*w.conversion+adopcion*w.adopcion+sanidad*w.sanidad+traccion*w.traccion)/wt; v.recomendacion=v.score>=4?'Escalar':v.score>=3?'Repetir / fortalecer evidencia':v.score>=2?'Ajustar antes de invertir':'Detener o replantear'; return v;}).sort((a,b)=>b.score-a.score); }
  function initIntelMap(){ setTimeout(()=>{ const el=$('intel_map'); if(!el||!window.L)return; if(state.maps.intel){state.maps.intel.remove(); state.maps.intel=null;} const map=L.map(el).setView([23.6,-102.5],5); L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19}).addTo(map); state.maps.intel=map; const ens=getEnsayos(); ens.forEach(e=>{ const p=parseLatLng(e.ubicacion); if(p){ const r=latestBy(getResultados(),'ensayo_id')[e.id]; L.marker(p).addTo(map).bindPopup(`<b>${esc(e.cultivo)} · ${esc(e.variedad_tratada)}</b><br>${esc(e.productor||'')}<br>Estado: ${esc(e.estado||'')}<br>ROI: ${r?pct(r.roi):'—'}`); }}); setTimeout(()=>map.invalidateSize(),100);},20); }
  function renderRadar(){ const v=varietyPortfolio().find(x=>x.variedad===fieldVal('rad_var'))||varietyPortfolio()[0]; if(!v){$('radar_box').innerHTML='<div class="notice">Sin variedades para graficar.</div>'; return;} safeSet('rad_var',v.variedad); const labels=Object.keys(v.dim), vals=Object.values(v.dim); const cx=150, cy=150, R=110; const pts=vals.map((val,i)=>{const ang=-Math.PI/2+i*2*Math.PI/vals.length; const rr=R*(val/5); return [cx+Math.cos(ang)*rr, cy+Math.sin(ang)*rr];}); const axes=labels.map((lab,i)=>{const ang=-Math.PI/2+i*2*Math.PI/labels.length; const x=cx+Math.cos(ang)*R, y=cy+Math.sin(ang)*R; return `<line x1="${cx}" y1="${cy}" x2="${x}" y2="${y}" stroke="#334155"/><text x="${cx+Math.cos(ang)*(R+24)}" y="${cy+Math.sin(ang)*(R+24)}" fill="#94a3b8" font-size="10" text-anchor="middle">${lab}</text>`;}).join(''); $('radar_box').innerHTML=`<svg viewBox="0 0 300 300"><circle cx="${cx}" cy="${cy}" r="${R}" fill="none" stroke="#334155"/><circle cx="${cx}" cy="${cy}" r="${R*.66}" fill="none" stroke="#334155"/><circle cx="${cx}" cy="${cy}" r="${R*.33}" fill="none" stroke="#334155"/>${axes}<polygon points="${pts.map(p=>p.join(',')).join(' ')}" fill="rgba(56,189,248,.30)" stroke="#38bdf8" stroke-width="2"/></svg><div class="notice"><b>${esc(v.variedad)}</b><br>Score: ${dec(v.score,2)} / 5 · ${esc(v.recomendacion)}</div>`; }
  function renderRice(){ const rows=varietyPortfolio().map(v=>{const reach=clamp(v.leads/10,1,5), impact=clamp(v.ventas/100000,1,5), confidence=clamp((v.ensayos+v.roiVals.length)/3,1,5), effort=clamp(5-v.score+1,1,5), rice=(reach*impact*confidence)/effort; return `<tr><td>${esc(v.variedad)}</td><td>${dec(reach,1)}</td><td>${dec(impact,1)}</td><td>${dec(confidence,1)}</td><td>${dec(effort,1)}</td><td>${dec(rice,2)}</td></tr>`;}); if($('rice_box'))$('rice_box').innerHTML=table(['Variedad','Reach','Impact','Confidence','Effort','RICE'],rows); }

  function renderExportar(){ const dataKeys=[K.ensayos,K.bitacora,K.resultados,K.oportunidades,K.eventos,K.leads,K.cobranza,K.workflow,K.sopDemanda,K.sopInv,K.sopProy,K.clientes,K.scores,K.cuentas,K.promesas,K.pagos]; $('page-exportar').innerHTML=`<div class="card"><h2>Exportación integral</h2><p class="muted">Genera un XLSX con pestañas internas para cada tabla del sistema. También puedes respaldar/restaurar JSON completo.</p><div class="actions"><button class="btn-success" onclick="APP.exportAll()">📤 Exportar XLSX completo</button><button class="btn-primary" onclick="APP.backupJSON()">💾 Descargar JSON respaldo</button><label class="btn btn-secondary" style="display:inline-block;width:auto">📥 Restaurar JSON<input type="file" accept=".json" style="display:none" onchange="APP.restoreJSON(event)"></label></div></div><div class="card"><h2>Tablas detectadas</h2>${table(['Tabla','Registros'],dataKeys.map(k=>`<tr><td>${k}</td><td>${int(read(k,Array.isArray(read(k))?[]:{}).length||0)}</td></tr>`))}</div><div class="card alert red"><b>Zona de mantenimiento:</b> borrar datos reinicia todo el sistema local de este navegador.</div><div class="actions"><button class="btn-danger" onclick="APP.clearAll()">🗑 Borrar todos los datos locales</button></div>`; }
  function exportAll(){ if(!window.XLSX){alert('No cargó la librería XLSX. Revisa conexión.');return;} const wb=XLSX.utils.book_new(); const sheets={Ensayos:getEnsayos(),Bitacora:get(K.bitacora),Resultados:getResultados(),Pipeline_Comercial:getOportunidades(),Eventos:getEventos(),Leads_Eventos:getLeads(),Cobranza_Eventos:getCobranza(),Workflow:getWorkflow(),SOP_Demanda:get(K.sopDemanda),SOP_Inventario:get(K.sopInv),SOP_Proyecciones:get(K.sopProy),Clientes:getClientes(),Scores:getScores(),Cuentas:getCuentas(),Promesas:getPromesas(),Pagos:getPagos(),Costos:[read(K.costos,{})],Portafolio:varietyPortfolio()}; Object.entries(sheets).forEach(([name,data])=>{XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(data.length?data:[{}]),name.slice(0,31));}); XLSX.writeFile(wb,'Galera_RICO_Sistema_Integral.xlsx'); }
  function exportOne(key){ if(!window.XLSX){alert('No cargó XLSX.');return;} const map={ensayos:getEnsayos(),bitacora:get(K.bitacora),resultados:getResultados(),oportunidades:getOportunidades(),eventos:getEventos(),leads:getLeads(),cobranza:getCobranza(),workflow:getWorkflow(),clientes:getClientes(),scores:getScores(),cuentas:getCuentas(),promesas:getPromesas(),pagos:getPagos()}; const data=map[key]||get(key); const wb=XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(data.length?data:[{}]),key.slice(0,31)); XLSX.writeFile(wb,`${key}_Galera.xlsx`); }
  function backupJSON(){ const all={}; Object.values(K).forEach(k=>all[k]=read(k, Array.isArray(read(k))?[]:{})); const blob=new Blob([JSON.stringify(all,null,2)],{type:'application/json'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='galera_rico_respaldo.json'; a.click(); URL.revokeObjectURL(a.href); }
  function restoreJSON(ev){ const f=ev.target.files[0]; if(!f)return; const r=new FileReader(); r.onload=()=>{try{const obj=JSON.parse(r.result); Object.entries(obj).forEach(([k,v])=>write(k,v)); toast('Respaldo restaurado'); renderCurrent();}catch(e){alert('JSON inválido.');}}; r.readAsText(f); }
  function clearAll(){ if(!confirm('¿Seguro que quieres borrar todos los datos locales del sistema?'))return; Object.values(K).forEach(k=>localStorage.removeItem(k)); toast('Datos borrados'); renderCurrent(); }

  function edit(entity,id){ const map={ensayo:['ensayos','ensayo'],bitacora:['bitacora','bitacora'],resultado:['resultados','resultado'],oportunidad:['pipeline','oportunidad'],evento:['eventos','evento'],lead:['eventos','lead'],cobro:['eventos','cobro'],workflow:['eventos','workflow'],cliente:['cartera','cliente'],score:['cartera','score'],cuenta:['cartera','cuenta'],pago:['cartera','pago'],promesa:['cartera','promesa'],demanda:['sop','demanda'],inventario:['sop','inventario']}; const m=map[entity]; if(!m)return; state.editing[m[1]]=id; show(m[0]); setTimeout(()=>{ if(entity==='lead')showSub('ev','leads',true); if(entity==='cobro')showSub('ev','pipeline',true); if(entity==='workflow')showSub('ev','workflow',true); if(entity==='score')showSub('car','scoring',true); if(entity==='cuenta')showSub('car','cuentas',true); if(entity==='pago')showSub('car','cobranza',true); if(entity==='promesa')showSub('car','promesas',true); if(entity==='demanda')showSub('sop','demanda',true); if(entity==='inventario')showSub('sop','inventario',true);},60); }
  function del(entity,id){ if(!confirm('¿Eliminar este registro?'))return; const keyMap={ensayo:K.ensayos,bitacora:K.bitacora,resultado:K.resultados,oportunidad:K.oportunidades,evento:K.eventos,lead:K.leads,cobro:K.cobranza,workflow:K.workflow,cliente:K.clientes,score:K.scores,cuenta:K.cuentas,pago:K.pagos,promesa:K.promesas,demanda:K.sopDemanda,inventario:K.sopInv,proyeccion:K.sopProy}; const key=keyMap[entity]; if(!key)return; save(key, get(key).filter(x=>!eq(x.id,id))); toast('Registro eliminado'); renderCurrent(); }
  function resetForm(entity){ if(entity in state.editing)state.editing[entity]=null; renderCurrent(); }

  function init(){ migrate(); buildNav(); show('dashboard'); }
  function migrate(){ saveEnsayos(getEnsayos()); }

  return {init,show,renderCurrent,showSub,saveEnsayo,importEnsayos,saveBitacora,filterBitacora,contextoResultado,calcResultado,saveResultado,saveOportunidad,calcEvento,saveEvento,saveLead,saveCobro,saveWorkflow,saveDemanda,saveInventario,calcSOP,saveProyeccion,saveCliente,saveScore,saveCuenta,savePago,savePromesa,saveCostos,saveWeights,defaultWeights,renderRadar,sendOpportunityToCartera,edit,del,resetForm,exportAll,exportOne,backupJSON,restoreJSON,clearAll};
})();
APP.init();
</script>
