  allPromises().forEach(pr=>{ const a=d.accounts.find(x=>eq(x.id,pr.accountId)); if(!a) alerts.push({sev:'bad',area:'Promesas PTP',msg:('Promesa '+pr.id+' no está ligada a una CxC existente'),action:'Vincular promesa a factura abierta válida.'}); else if(clientKey(pr.client)!==clientKey(a.client)) alerts.push({sev:'warn',area:'Promesas PTP',msg:('Promesa '+pr.id+' trae cliente distinto a la factura'),action:'Corregir cliente desde CxC.'}); if(!pr.promiseDate) alerts.push({sev:'bad',area:'Promesas PTP',msg:('Promesa '+pr.id+' no tiene fecha compromiso'),action:'Capturar fecha promesa.'}); if(n(pr.promisedAmount)<=0) alerts.push({sev:'bad',area:'Promesas PTP',msg:('Promesa '+pr.id+' tiene monto cero'),action:'Capturar monto prometido.'}); });
  d.scores.forEach(s=>{ if(!clientExists(s.client)) alerts.push({sev:'bad',area:'Scoring',msg:('Score '+s.id+' usa cliente no registrado: '+(s.client||'sin nombre')),action:'Crear/normalizar cliente maestro antes de autorizar crédito.'}); const total=scoreExpected(s); if(Math.round(total)!==Math.round(n(s.score))) alerts.push({sev:'warn',area:'Scoring',msg:('Score de '+s.client+' no coincide con la suma oficial 25/20/15/15/15/10'),action:'Recalcular scoring con criterios v3.9.'}); if(!scoreIsCurrent(s)) alerts.push({sev:'warn',area:'Scoring',msg:('Score de '+s.client+' está vencido o sin revisión vigente'),action:'Actualizar revisión de crédito antes de nueva venta a crédito.'}); });
  d.unlocks.forEach(u=>{ if(!clientExists(u.client)) alerts.push({sev:'bad',area:'Desbloqueos',msg:('Desbloqueo '+u.id+' usa cliente no registrado: '+(u.client||'sin nombre')),action:'Seleccionar cliente maestro existente.'}); if((u.status||'Activo')==='Activo'&&!u.usedAt&&(!u.linkType||!u.linkId)) alerts.push({sev:'bad',area:'Desbloqueos',msg:('Desbloqueo activo de '+u.client+' no está ligado a operación específica'),action:'Definir ID de oportunidad/factura para evitar liberación abierta.'}); if((u.status||'Activo')==='Activo'&&!u.usedAt&&(!u.validUntil||daysBetween(today(),u.validUntil)<0)) alerts.push({sev:'bad',area:'Desbloqueos',msg:('Desbloqueo activo de '+u.client+' sin vigencia válida'),action:'Cerrar, renovar o corregir vigencia.'}); if((u.status||'Activo')==='Activo'&&!u.usedAt&&(!n(u.maxAmount)||n(u.maxAmount)<=0)) alerts.push({sev:'bad',area:'Desbloqueos',msg:('Desbloqueo activo de '+u.client+' sin monto máximo'),action:'Definir monto máximo autorizado.'}); if((u.status||'Activo')==='Activo'&&!u.usedAt&&(!u.authorizedBy||!u.registeredBy||!u.reason||!u.reference)) alerts.push({sev:'bad',area:'Desbloqueos',msg:('Desbloqueo activo de '+u.client+' incompleto'),action:'Completar autorización, usuario que registra, referencia y motivo.'}); });
  const names=d.clients.map(c=>clientKey(c.name)).filter(Boolean); [...new Set(names)].forEach(k=>{ if(names.filter(x=>x===k).length>1) alerts.push({sev:'warn',area:'Cliente maestro',msg:('Cliente duplicado detectado: '+(d.clients.find(c=>clientKey(c.name)===k)?.name)),action:'Fusionar registros para no duplicar cartera, pagos o scoring.'}); });
  const sop=calcSOP(); if(sop.stockouts>0) alerts.push({sev:'bad',area:'S&OP',msg:(sop.stockouts+' variedad(es) con riesgo de stockout'),action:'Reunión S&OP: comprar, reasignar o ajustar promoción.'});
  if(read(K.demand).some(x=>n(x.forecast)>0)&&!sop.mapeCount) alerts.push({sev:'warn',area:'S&OP / Forecast',msg:'Hay forecast capturado pero no hay venta/demanda real para calcular MAPE.',action:'Capturar Venta real del periodo en Demanda S&OP para medir precisión del pronóstico.'});
  const penalty=sum(alerts.map(a=>a.sev==='bad'?9:4)); const score=clamp(100-penalty,0,100);
  return {score,alerts};
}

  function executiveText(m){
    const parts=[];
    if(m.quality.score>=80) parts.push('<p class="green"><b>Operación legible:</b> los datos actuales permiten tomar decisiones con bajo nivel de ruido.</p>'); else parts.push('<p class="yellow"><b>Prioridad:</b> antes de sofisticar más pantallas, hay que cerrar conexiones faltantes entre ensayo, evidencia, pipeline, inventario y cobro.</p>');
    if(m.roiTrials>=30 && m.trialConversion>=25) parts.push('<p>Los ensayos están cumpliendo doble objetivo: validan técnicamente y están convirtiendo comercialmente. Conviene convertir los mejores en recetas comerciales y campañas por zona.</p>');
    else parts.push('<p>El foco debe ser menos ensayos dispersos y más ensayos con objetivo, evidencia, costo, resultado y responsable comercial desde el inicio.</p>');
    if(m.cartera.pct60>10) parts.push('<p class="red"><b>Caja en riesgo:</b> cartera 60+ arriba de meta. La regla recomendada es bloqueo automático salvo plan de pago firmado.</p>');
    return parts.join('');
  }

  /* =====================================================
     GALERA RICO v3.9 — CONTROL FINANCIERO INTEGRAL
     Auditoría aplicada: scoring oficial, exposición futura,
     pagos reales, desbloqueo específico y demanda bloqueada.

  function accountFx(a){ return String(a?.currency||'MXN')==='USD' ? (n(a.fxRate)||0) : 1; }
  function accountAmountMXN(a){ return n(a?.amount)*accountFx(a); }
  function accountCreditNoteMXN(a){ return n(a?.creditNote)*accountFx(a); }
  function paymentFx(p){ const a=read(K.accounts).find(x=>eq(x.id,p.accountId)); return a?accountFx(a):1; }
  function paymentAmountMXN(p){ return n(p?.amount)*paymentFx(p); }
  function accountPayments(accountId){ return read(K.payments).filter(p=>eq(p.accountId,accountId)); }
  function accountPaid(a){ return sum(accountPayments(a.id).map(p=>p.amount)); }
  function accountPaidMXN(a){ return sum(accountPayments(a.id).map(paymentAmountMXN)); }
  function accountPaidUntil(a,date){ return sum(accountPayments(a.id).filter(p=>!date||String(p.paymentDate||'')<=String(date)).map(p=>p.amount)); }
  function accountBalance(a){ return Math.max(0,n(a.amount)-accountPaid(a)-n(a.creditNote)); }
  function accountBalanceMXN(a){ return Math.max(0,accountAmountMXN(a)-accountPaidMXN(a)-accountCreditNoteMXN(a)); }
  function accountIsOpen(a){ return accountBalance(a)>0.009; }
  function accountOverdueRaw(a){ if(!accountIsOpen(a)||!a.dueDate)return 0; return age(a.dueDate); }
  function accountOverdueDays(a){ return Math.max(0,accountOverdueRaw(a)); }
  function accountAgingBucket(a){ const raw=accountOverdueRaw(a); if(raw<=0)return 'vigente'; if(raw<=15)return 'v1_15'; if(raw<=30)return 'v16_30'; if(raw<=60)return 'v31_60'; return 'v60'; }
  function accountStatus(a){
    const bal=accountBalance(a), paid=accountPaid(a), raw=accountOverdueRaw(a);
    if(bal<=0)return {label:'Pagada',cls:'green'};
    if(!a.dueDate)return {label:'Sin venc.',cls:'yellow'};
    if(raw<=0)return {label:'Vigente',cls:'green'};
    if(raw<=15)return {label:`${raw} días`,cls:'green'};
    if(raw<=30)return {label:`${raw} días`,cls:'yellow'};
    if(raw<=60)return {label:`${raw} días`,cls:'red'};
    if(paid>0)return {label:`60+ parcial`,cls:'red'};
    return {label:'60+',cls:'red'};
  }
  function scoreIsCurrent(s){ const ref=s?.ultimaRevision||s?.updatedAt; if(!ref)return false; const a=age(String(ref).slice(0,10)); return a>=0 && a<=180; }
  function latestScoreFor(client){ const key=clientKey(client); return read(K.scores).filter(s=>clientKey(s.client)===key).sort((a,b)=>String(b.ultimaRevision||b.updatedAt||'').localeCompare(String(a.ultimaRevision||a.updatedAt||'')))[0]||null; }
  function scoreExternalExposure(s){ if(!s)return 0; if(s.exposicionManual!==undefined)return n(s.exposicionManual); if(s.exposicionActualManual!==undefined)return n(s.exposicionActualManual); return 0; }
  function leadAccounts(leadId){ return read(K.accounts).filter(a=>eq(a.leadId,leadId)); }
  function leadPaidMXN(leadId){ return sum(leadAccounts(leadId).map(accountPaidMXN)); }
  function leadHasOpenAccounts(leadId){ return leadAccounts(leadId).some(accountIsOpen); }
  function leadFinanciallyClosed(l){ if(!l||!l.id)return false; const acc=leadAccounts(l.id); return acc.length>0 && acc.every(a=>!accountIsOpen(a)); }
  function pendingPipelineExposure(client,excludeLeadId=''){
    const ck=clientKey(client); const billed=new Set(read(K.accounts).map(a=>a.leadId).filter(Boolean));
    return sum(read(K.leads).filter(l=>clientKey(l.nombre)===ck && !eq(l.id,excludeLeadId) && ['Orden','Entrega','Factura'].includes(l.stage||'') && !billed.has(l.id)).map(l=>l.ticket));
  }
  function clientExposure(client){ const ck=clientKey(client); return sum(read(K.accounts).filter(a=>clientKey(a.client)===ck).map(accountBalanceMXN)); }
  function unlockReferenceOptions(client='',type='Pipeline',current=''){
    const ck=clientKey(client); let opts=[];
    if(type==='Factura / CxC'){
      opts=read(K.accounts).filter(a=>(!ck||clientKey(a.client)===ck)&&accountIsOpen(a)).map(a=>({id:a.id,label:`${a.factura||a.id} · saldo ${money(accountBalanceMXN(a))}`,amount:accountBalanceMXN(a)}));

iesgo estacional',10,[[10,'Temporada favorable y exposición baja'],[5,'Riesgo manejable'],[0,'Temporada riesgosa o exposición concentrada']])}</div><div class="actions"><button class="btn-primary" onclick="APP.previewScore()">Previsualizar</button><button class="btn-success" onclick="APP.saveScore()">Guardar score</button></div><div id="score_preview"></div></div><div class="card"><h2>Scoring de clientes</h2>${table(['Cliente','Score','Banda','Plazo','Límite','CxC sistema','Exposición externa','Vigencia','Estado','Última revisión','Acciones'],rows)}</div>`;

  function validateCreditForOperation(client,amount,ctx={}){
    if(!clientExists(client))return {ok:false,msg:'El cliente no existe en Cliente Maestro. Créalo o jálelo desde pipeline antes de avanzar.'};

    if(st.unlock&&n(st.unlock.maxAmount)>0&&n(amount)>n(st.unlock.maxAmount))return {ok:false,msg:`La operación excede el monto máximo autorizado de desbloqueo (${money(st.unlock.maxAmount)}).`};
    return {ok:true,st};

  function renderSOPDash(){ const d=data(); const m=calcSOP(); const c=calcCartera(); const vars=[...new Set([...d.demand.map(x=>x.variedad),...d.inventory.map(x=>x.variedad)].filter(Boolean))]; const rows=vars.map(v=>{const dem=d.demand.filter(x=>x.variedad===v); const inv=d.inventory.filter(x=>x.variedad===v); const unit=sopVarUnit(dem,inv); const pedidos=sum(dem.map(x=>x.pedidosFirmes)); const forecast=sum(dem.map(x=>x.forecast)); const real=sum(dem.map(x=>x.ventaReal)); const mapeVals=dem.map(sopMapeRow).filter(x=>x!==null); const mape=mapeVals.length?avg(mapeVals):null; const net=sum(inv.map(x=>n(x.disponible)-n(x.comprometido)+n(x.transito)+n(x.pedidoAbierto))); const weekly=sum(dem.map(x=>x.demandaSemanal))||sum(inv.map(x=>x.demandaSemanal)); const cov=weekly?net/weekly:0; const seguridad=avg(inv.map(x=>n(x.seguridadSemanas)))||5; let decision='Mantener'; if(net<pedidos)decision='Comprar / reasignar urgente'; else if(cov<seguridad)decision='Reabastecer'; else if(cov>8)decision='Sobrestock: activar venta'; return `<tr><td>${esc(v)}</td><td>${esc(unit)}</td><td>${fmtSOP(pedidos,unit)}</td><td>${fmtSOP(forecast,unit)}</td><td>${real?fmtSOP(real,unit):'—'}</td><td>${mape===null?pill('Sin real','yellow'):pill(pct(mape),mape<=20?'green':mape<=35?'yellow':'red')}</td><td>${fmtSOP(net,unit)}</td><td>${dec(cov,1)} sem</td><td>${dec(seguridad,1)} sem</td><td>${decision.includes('urgente')?pill(decision,'red'):decision.includes('Sobrestock')?pill(decision,'yellow'):pill(decision,'green')}</td></tr>`}); $('sop_content').innerHTML=`<div class="kpi-grid">${kpi('Fill-rate pedidos firmes',pct(m.fillRate),'Valor cubierto / pedidos firmes',m.fillRate>=90?'good':m.fillRate>=75?'warn':'bad')}${kpi('MAPE forecast',m.mapeCount?pct(m.mape):'Sin venta real',`${m.mapeCount} registro(s) con real capturado · Bias ${m.mapeCount?pct(m.bias):'—'}`,!m.mapeCount?'warn':m.mape<=20?'good':m.mape<=35?'warn':'bad')}${kpi('Riesgos stockout',int(m.stockouts),'Variedades sin cobertura firme',m.stockouts?'bad':'good')}${kpi('Cobertura promedio',dec(m.coverage,1)+' sem','Meta 5–7 semanas',m.coverage>=5&&m.coverage<=7?'good':m.coverage>=3?'warn':'bad')}${kpi('Demanda liberable',money(c.demandLiberable),'Pipeline con crédito/contado liberable','good')}${kpi('Demanda bloqueada',money(c.demandBlocked),'No comprar/reservar sin desbloqueo',c.demandBlocked?'bad':'good')}${kpi('Pedidos abiertos',fmtSOP(m.openPO,'$'),'Órdenes aún no recibidas; ver tabla por unidad','info')}</div><div class="card"><h2>Decisión S&OP por variedad</h2>${table(['Variedad','Unidad','Pedidos firmes','Forecast','Real','MAPE','Inventario neto','Cobertura','Seguridad','Decisión'],rows)}</div><div class="card"><h2>Regla S&OP + crédito</h2><div class="notice warn"><b>Demanda bloqueada:</b> no debe detonar compra, reserva ni surtido hasta que exista pago, score vigente, límite disponible o desbloqueo específico.</div><div class="notice info"><b>v3.9:</b> las tablas respetan la Unidad S&OP. El MAPE solo se calcula cuando se captura venta/demanda real comparable en la misma unidad.</div></div>`; }


  function textMetricScore(v){ const s=norm(v); if(!s)return 0; if(s.includes('muy_buena')||s.includes('excelente'))return 92; if(s.includes('buena'))return 78; if(s.includes('regular')||s.includes('media')||s.includes('intermedia'))return 55; if(s.includes('mala')||s.includes('baja'))return 25; return 50; }

  function resultTechnicalScore(r){ if(!r)return 0; const vals=[]; if(n(r.calidad))vals.push(n(r.calidad)*20); if(n(r.facilidad))vals.push(n(r.facilidad)*20); if(n(r.porcentajeCosecha))vals.push(clamp(r.porcentajeCosecha)); ['sanidadGeneral','uniformidadPlantaFruta','madurez'].forEach(k=>{const v=textMetricScore(r[k]); if(v)vals.push(v);}); return vals.length?avg(vals):0; }
  function varietalPortfolio(){
    const d=data(), latest=latestResultsByTrial(), f=state.intel.filters||{};
    const trials=d.trials.filter(t=>(!f.cultivo||eq(t.cultivo,f.cultivo))&&(!f.region||eq(t.region,f.region))&&(!f.estado||eq(t.estado,f.estado))&&(!f.variedad||eq(t.variedad,f.variedad)));
    const byVar={};
    trials.forEach(t=>{ const v=t.variedad||'Sin variedad'; const r=latest[t.id]; const leads=d.leads.filter(l=>eq(l.trialId,t.id)); const orders=leads.filter(leadIsOrder); const closed=leads.filter(leadIsClosed); const x=byVar[v]||(byVar[v]={variedad:v,trials:0,terminated:0,cultivos:new Set(),regions:new Set(),estados:new Set(),benchmarks:new Set(),tecnicos:new Set(),roi:[],mejora:[],rendTratado:[],technical:[],sanidad:[],facilidad:[],leads:0,orders:0,closed:0,pipeline:0,sales:0,areaPotencial:0,ticketsPotenciales:0,latestResults:0}); x.trials++; if(t.estado==='Terminado')x.terminated++; x.cultivos.add(t.cultivo||''); x.regions.add(t.region||''); x.estados.add(t.estado||''); x.benchmarks.add(t.control||t.proveedorControl||t.competidorObjetivo||''); x.tecnicos.add(t.tecnico||''); x.leads+=leads.length; x.orders+=orders.length; x.closed+=closed.length; x.pipeline+=sum(leads.map(l=>l.ticket)); x.sales+=sum(closed.map(l=>l.ticket)); x.areaPotencial+=n(t.areaPotencialHa); x.ticketsPotenciales+=n(t.ticketPotencial); if(r){x.latestResults++; x.roi.push(r.roiPct); x.mejora.push(r.mejoraPct); x.rendTratado.push(r.rendTratado); x.technical.push(resultTechnicalScore(r)); x.sanidad.push(textMetricScore(r.sanidadGeneral)||n(r.calidad)*20); x.facilidad.push(n(r.facilidad)*20); }});
    const weights=currentVarietalWeights(); const totalW=sum(Object.values(weights));
    return Object.values(byVar).map(x=>{ const rendimiento=clamp(avg(x.mejora)*4,0,100); const roi=clamp(avg(x.roi),0,100); const conversion=x.leads?clamp(x.orders/x.leads*100,0,100):0; const adopcion=x.trials?clamp(x.closed/x.trials*100,0,100):0; const sanidad=clamp(avg(x.sanidad)||avg(x.technical),0,100); const traccion=x.trials?clamp((x.leads/x.trials)*20 + (x.pipeline?Math.min(20,x.sales/(x.pipeline||1)*20):0),0,100):0; const technicalScore=clamp(rendimiento*.35+sanidad*.30+clamp(avg(x.technical),0,100)*.25+clamp(avg(x.facilidad),0,100)*.10,0,100); const score=totalW?((rendimiento*n(weights.rendimiento))+(roi*n(weights.roi))+(conversion*n(weights.conversion))+(adopcion*n(weights.adopcion))+(sanidad*n(weights.sanidad))+(traccion*n(weights.traccion)))/totalW:0; const status=score>=80&&avg(x.roi)>=30&&avg(x.mejora)>0?'Estrella':score>=65?'Promesa':score>=45?'En validación':'Riesgo'; const decision=status==='Estrella'?'Escalar comercialmente':status==='Promesa'?'Repetir en más zonas / fortalecer evidencia':status==='En validación'?'Completar evidencia, pipeline y benchmark':'Detener, rediseñar o descartar'; return {...x,rendimientoScore:rendimiento,roiScore:roi,conversionScore:conversion,adopcionScore:adopcion,sanidadScore:sanidad,traccionScore:traccion,technicalScore,score,status,decision}; }).sort((a,b)=>b.score-a.score);
  }

  function initIntelMap(){ const el=$('intelMap'); if(!el||!window.L)return; const map=L.map(el).setView([24.2,-102.5],5); L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19}).addTo(map); const d=data(); const latest=latestResultsByTrial(); let pts=[]; d.trials.forEach(t=>{const p=parseGPS(t.gps); if(p){const r=latest[t.id]; const color=r&&n(r.roiPct)>=30?'green':r&&n(r.roiPct)>=0?'orange':'red'; const marker=L.circleMarker(p,{radius:8,color,fillColor:color,fillOpacity:.75}).addTo(map).bindPopup(`<b>${esc(t.variedad)}</b><br>${esc(t.cultivo)} · ${esc(t.region)}<br>ROI: ${r?pct(r.roiPct):'Sin resultado'}<br>Estado: ${esc(t.estado||'')}`); pts.push(marker);}}); if(pts.length){const group=L.featureGroup(pts); map.fitBounds(group.getBounds().pad(.2));} setTimeout(()=>map.invalidateSize(),100); }

  function roiByTechnicianRows(d,latest){ const by={}; d.trials.forEach(t=>{const key=t.tecnico||'Sin técnico'; const r=latest[t.id]; const x=by[key]||(by[key]={trials:0,done:0,roi:[],mejora:[],tec:[]}); x.trials++; if(t.estado==='Terminado')x.done++; if(r){x.roi.push(r.roiPct); x.mejora.push(r.mejoraPct); x.tec.push(resultTechnicalScore(r));}}); return Object.entries(by).filter(([_,x])=>x.roi.length).sort((a,b)=>avg(b[1].roi)-avg(a[1].roi)).map(([tec,x])=>`<tr><td>${esc(tec)}</td><td>${int(x.trials)}</td><td>${int(x.done)}</td><td>${pct(avg(x.roi))}</td><td>${pct(avg(x.mejora))}</td><td>${avg(x.tec)?pct(avg(x.tec),0):'N/D'}</td><td>${avg(x.roi)>=30?pill('Documentar receta','green'):avg(x.roi)>=0?pill('Ajustar variables','yellow'):pill('Revisar o detener','red')}</td></tr>`); }
  function cycleComparison(d,latest){ const groups={}; d.trials.forEach(t=>{const key=t.ciclo||((t.siembra||'').slice(0,4))||'Sin ciclo'; const date=t.siembra||t.fechaAlta||''; const x=groups[key]||(groups[key]={key,trials:[],date:''}); x.trials.push(t); if(date>x.date)x.date=date;}); const arr=Object.values(groups).sort((a,b)=>String(b.date||b.key).localeCompare(String(a.date||a.key))); if(arr.length<2)return '<p class="muted"><i>No hay suficiente información para comparar ciclos.</i></p>'; const rows=arr.slice(0,2).map(g=>{const res=g.trials.map(t=>latest[t.id]).filter(Boolean); const leads=g.trials.flatMap(t=>d.leads.filter(l=>eq(l.trialId,t.id))); return `<tr><td>${esc(g.key)}</td><td>${int(g.trials.length)}</td><td>${pct(avg(res.map(r=>r.roiPct)))}</td><td>${pct(avg(res.map(r=>r.mejoraPct)))}</td><td>${int(leads.length)}</td><td>${money(sum(leads.filter(leadIsClosed).map(l=>l.ticket)))}</td></tr>`;}); return table(['Ciclo','Ensayos','ROI prom.','Mejora prom.','Leads','Ventas cobradas'],rows); }

  function validateImportRow(module,row,sets){ const errors=[]; const warns=[];

      if(row.accountId&&!sets.accountIds.has(String(row.accountId)))errors.push('Pago ligado a CxC inexistente.');
      if(n(row.amount)<=0)errors.push('Pago con monto cero o negativo.');

    }

      if(!sets.clientKeys.has(clientKey(row.client)))errors.push('Scoring sin cliente maestro.');
      if(n(row.score)>100)errors.push('Score mayor a 100.');
      const expected=n(row.historialPago)+n(row.antiguedad)+n(row.volumen)+n(row.referencias)+n(row.garantias)+n(row.riesgoEstacional);
      if(row.score!==undefined&&n(row.score)>0&&Math.abs(n(row.score)-expected)>1)warns.push('Score no cuadra contra pesos oficiales 25/20/15/15/15/10.');

      if(!row.validUntil)errors.push('Desbloqueo sin vigencia.');
      if(n(row.maxAmount)<=0)errors.push('Desbloqueo sin monto máximo.');
      if(!row.authorizedBy)errors.push('Desbloqueo sin autorizado por.');
      if(!row.registeredBy)errors.push('Desbloqueo sin registrado por.');
      if(!row.reason)errors.push('Desbloqueo sin motivo.');

    rows.forEach(row=>{ const nk=naturalKeyFor(module,row); const rowLabel=row.__row||''; const v=validateImportRow(module,row,sets); if(v.warns.length){report.warnings+=v.warns.length; v.warns.forEach(msg=>report.details.push({sev:'warn',module,row:rowLabel,msg}));}
      if(v.errors.length){report.errors+=v.errors.length; v.errors.forEach(msg=>report.details.push({sev:'bad',module,row:rowLabel,msg})); return;}
      if(nk&&seen.has(nk)){report.duplicates++; report.details.push({sev:'warn',module,row:rowLabel,msg:'Duplicado probable dentro del mismo archivo. Se ignoró esta repetición.'}); return;} if(nk)seen.add(nk);
      const idx=findImportMatch(arr,module,row); if(idx>=0){const conflicts=detectConflicts(module,arr[idx],row); if(conflicts.length){report.conflicts++; report.details.push({sev:'bad',module,row:rowLabel,msg:'Conflicto contra registro existente: '+conflicts.join(', ')}); return;} arr[idx]=safeMergeRecord(arr[idx],{...row,importBatchId:batchId}); report.updated++; safe.push(row);}
      else {const clean={...row,importBatchId:batchId}; Object.keys(clean).forEach(k=>{if(k.startsWith('__'))delete clean[k];}); arr.push(clean); report.new++; safe.push(row);}
    }); write(key,arr); return report;
  }
  function previewSecureImport(rows){ const names={trials:'Ensayos',evidence:'Bitácora',results:'Resultados',events:'Eventos',leads:'Leads/Pipeline',demand:'Demanda S&OP',inventory:'Inventario',clients:'Clientes',accounts:'Cartera/CxC',payments:'Pagos/Abonos',promises:'Promesas PTP',scores:'Scoring',unlocks:'Desbloqueos',policies:'Política financiera detalle'}; const sets=importVirtualSets(rows); const rowsHtml=Object.entries(rows).map(([m,rs])=>{ let errors=0,warns=0,dups=0; const seen=new Set(); rs.forEach(r=>{const v=validateImportRow(m,r,sets); errors+=v.errors.length; warns+=v.warns.length; const nk=naturalKeyFor(m,r); if(nk&&seen.has(nk))dups++; if(nk)seen.add(nk);}); const cls=errors?'red':warns||dups?'yellow':'green'; return `<tr><td>${esc(names[m]||m)}</td><td>${int(rs.length)}</td><td>${pill(errors?'Errores':'OK',errors?'red':'green')}</td><td>${int(errors)}</td><td>${int(warns)}</td><td>${int(dups)}</td></tr>`; }).join(''); return `<b>Prevalidación segura v3.9.</b><br><span class="small">No se ha guardado nada. Corrige errores bloqueantes antes de importar. Los conflictos y duplicados probables no se cargarán.</span>${table(['Hoja','Filas detectadas','Estado','Errores','Advertencias','Duplicados internos'],[rowsHtml])}`; }
  function importReportHtml(reports){ const totals=reports.reduce((a,r)=>{['read','new','updated','duplicates','conflicts','errors','warnings'].forEach(k=>a[k]=(a[k]||0)+r[k]); return a;},{}); const summaryRows=reports.map(r=>`<tr><td>${esc(r.module)}</td><td>${int(r.read)}</td><td>${int(r.new)}</td><td>${int(r.updated)}</td><td>${int(r.duplicates)}</td><td>${int(r.conflicts)}</td><td>${int(r.errors)}</td><td>${int(r.warnings)}</td></tr>`).join(''); const details=reports.flatMap(r=>r.details||[]).slice(0,80).map(d=>`<div class="notice ${d.sev}"><b>${esc(d.module)} fila ${esc(d.row||'—')}:</b> ${esc(d.msg)}</div>`).join('')||'<div class="notice good">Sin errores ni conflictos relevantes.</div>'; return `<b>Importación segura completada.</b><br><span class="small">Nuevos: ${int(totals.new)} · Actualizados: ${int(totals.updated)} · Duplicados ignorados: ${int(totals.duplicates)} · Conflictos bloqueados: ${int(totals.conflicts)} · Errores bloqueados: ${int(totals.errors)}</span>${table(['Hoja','Leídos','Nuevos','Actualizados','Duplicados','Conflictos','Errores','Advertencias'],[summaryRows])}<h3>Detalle de gobierno de datos</h3>${details}`; }

  function importExcel(){ const file=$('excelImport')?.files?.[0]; if(!file){alert('Selecciona un archivo Excel.');return;} if(!window.XLSX){alert('La librería XLSX no está disponible.');return;} const mode=field('excelImportMode')||'preview'; const r=new FileReader(); r.onload=()=>{try{ const wb=XLSX.read(new Uint8Array(r.result),{type:'array',cellDates:true}); const rows=importStageRows(wb,read(K.trials)); if(mode==='preview'){$('excelImportResult').innerHTML=previewSecureImport(rows); return;} const batchId=uid('IMP'); const sets=importVirtualSets(rows); const order=[['trials',K.trials],['clients',K.clients],['events',K.events],['evidence',K.evidence],['results',K.results],['leads',K.leads],['demand',K.demand],['inventory',K.inventory],['accounts',K.accounts],['payments',K.payments],['promises',K.promises],['scores',K.scores],['unlocks',K.unlocks],['policies',K.policies]]; const reports=order.map(([m,k])=>applySecureImport(m,k,rows[m]||[],sets,batchId)); const details=reports.flatMap(r=>r.details||[]); saveImportBatchLog({id:batchId,file:file.name,importedAt:new Date().toISOString(),reports:reports.map(r=>({module:r.module,read:r.read,new:r.new,updated:r.updated,duplicates:r.duplicates,conflicts:r.conflicts,errors:r.errors,warnings:r.warnings})),details}); $('excelImportResult').innerHTML=importReportHtml(reports); const audit=qualityAudit(); const hasBad=details.some(d=>d.sev==='bad')||audit.alerts.some(a=>a.sev==='bad'); toast('Importación segura terminada · '+details.length+' hallazgos de importación · auditoría: '+audit.alerts.length,hasBad?'warn':'good'); if(hasBad){state.page='calidad'; show('calidad');} }catch(err){console.error(err); alert('No pude leer el Excel. Revisa formato, hojas y encabezados.');}}; r.readAsArrayBuffer(file); }

  function isoDate(v){
    if(v instanceof Date && !isNaN(v))return v.toISOString();
    const s=String(v||'').trim(); if(!s)return '';
    if(/^\d{4}-\d{2}-\d{2}T/.test(s))return s;
    if(/^\d{4}-\d{2}-\d{2}$/.test(s))return new Date(s+'T12:00:00').toISOString();
    return s;
  }

    const c=norm(cultivo); if(c.includes('tomate'))return .35; if(c.includes('cebolla'))return .25; if(c.includes('melon'))return .28; if(c.includes('pimiento')||c.includes('chile'))return .30; if(c.includes('lechuga'))return .30; return .30;
  }

  function resultExportCore(r,trials){
    const t=trials.find(x=>eq(x.id,r.trialId))||{}; const area=n(r.areaHa)||n(t.superficieHa)||0; const areaPot=n(t.areaPotencialHa)||n(r.superficiePotencialProductorHa)||0;
    const diffTon = (r.diffTon!==undefined)?n(r.diffTon):(n(r.rendTratado)-n(r.rendControl)); const diffKgHa=diffTon*1000; const diffKgTotal=(r.diffKg!==undefined)?n(r.diffKg):(diffKgHa*(area||1));
    const unitMargin=(r.unitMargin!==undefined)?n(r.unitMargin):(n(r.precioKg)-n(r.costoVariableKg)); const margenHa=diffKgHa*unitMargin; const margenTotal=(r.margen!==undefined)?n(r.margen):(margenHa*(area||1));
    const costoHoras=n(r.horasTec)*n(r.costoHora); const costoTotal=(r.costo!==undefined)?n(r.costo):(n(r.semilla)+n(r.insumos)+n(r.materiales)+costoHoras+n(r.traslados)+n(r.otros));
    const roiRatio=(r.roi!==undefined)?n(r.roi):(r.roiPct!==undefined?n(r.roiPct)/100:(costoTotal?((margenTotal-costoTotal)/costoTotal):0));

  function financialPolicy(){
    const st=settingsObj(); const p=st.financialPolicy||{};
    return {commissionPct:n(p.commissionPct||2),eventMarginPct:n(p.eventMarginPct||30),updatedBy:p.updatedBy||'',updatedAt:p.updatedAt||''};
  }
  function financePolicyRules(){ return read(K.policies).filter(r=>(r.status||'Activo')==='Activo'); }
  function policyScopeRank(scope){ const s=norm(scope); if(s.includes('evento'))return 5; if(s.includes('variedad'))return 4; if(s.includes('cultivo'))return 3; if(s.includes('responsable')||s.includes('vendedor'))return 2; if(s.includes('global'))return 1; return 0; }
  function policyMatches(rule,ctx={}){
    const scope=norm(rule.scope||rule.alcance||''); const key=norm(rule.key||rule.clave||''); if(!key)return false;
    if(scope.includes('evento'))return key===norm(ctx.event||ctx.evento||ctx.nombreEvento||'');
    if(scope.includes('variedad'))return key===norm(ctx.variedad||'');
    if(scope.includes('cultivo'))return key===norm(ctx.cultivo||'');
    if(scope.includes('responsable')||scope.includes('vendedor'))return key===norm(ctx.owner||ctx.responsable||'');
    if(scope.includes('global'))return true;
    return false;
  }
  function financialPolicyFor(ctx={}){
    const base=financialPolicy();
    const match=financePolicyRules().filter(r=>policyMatches(r,ctx)).sort((a,b)=>policyScopeRank(b.scope)-policyScopeRank(a.scope))[0];
    if(!match)return base;
    return {...base,commissionPct:match.commissionPct!==''&&match.commissionPct!==undefined?n(match.commissionPct):base.commissionPct,eventMarginPct:match.eventMarginPct!==''&&match.eventMarginPct!==undefined?n(match.eventMarginPct):base.eventMarginPct,rule:match};
  }

  function clientCreditStatus(client,futureAmount=0,ctx={}){

    const exposure=systemExposure+externalExposure+pending; const futureExposure=exposure+n(futureAmount); const limit=n(score?.limiteCredito); const overLimit=limit>0&&futureExposure>limit;

    const needsCreditGate=n(futureAmount)>0 || ctx.requireCredit;

  function calcCartera(){
    const d=data(); const p=financialPolicy(); const open=d.accounts.filter(accountIsOpen); const total=sum(open.map(accountBalanceMXN)); const sales90=sum(d.accounts.filter(a=>age(a.saleDate)>=0&&age(a.saleDate)<=90).map(accountAmountMXN)); const daily=sales90/90; const dso=daily?total/daily:null;
    const aging={vigente:0,v1_15:0,v16_30:0,v31_60:0,v60:0}; let exposureBlocked=0;
    open.forEach(a=>{ const bal=accountBalanceMXN(a); aging[accountAgingBucket(a)]+=bal; if(accountAgingBucket(a)==='v60'||String(a.bloqueoSolicitado||'')==='Sí') exposureBlocked+=bal; });
    const pct60=total?aging.v60/total*100:0; const clients=[...new Set(open.map(a=>a.client).filter(Boolean).map(clientKey))]; const blocked=clients.filter(k=>clientCreditStatus(open.find(a=>clientKey(a.client)===k)?.client,0,{requireCredit:true}).blocked).length; const partial=open.filter(a=>accountPaid(a)>0&&accountBalance(a)>0).length;

    const collected=(days)=>{const base=d.accounts.filter(a=>age(a.saleDate)>=0&&age(a.saleDate)<=days); const sold=sum(base.map(accountAmountMXN)); const paid=sum(base.map(accountPaidMXN)); return sold?paid/sold*100:0;};

  function renderCarteraDash(){ const c=calcCartera(); const total=c.total||1; const p=financialPolicy(); const clientRows=clientUniverse().map(cu=>clientCreditStatus(cu.name,0,{requireCredit:true})).filter(st=>st.exposure>0||st.hardBlocked).sort((a,b)=>b.exposure-a.exposure).slice(0,14).map(st=>`<tr><td>${esc(st.client)}</td><td>${st.blocked?pill('Bloqueado','red'):st.hardBlocked?pill('Excepción específica requerida','yellow'):pill('Libre','green')}</td><td>${esc(st.banda)}</td><td>${money(st.systemExposure)}</td><td>${money(st.externalExposure)}</td><td>${money(st.pendingExposure)}</td><td>${money(st.futureExposure||st.exposure)}</td><td>${money(st.overdue60)}</td><td>${money(st.limit)}</td><td>${esc(st.reasons.join(' · ')||'Sin alerta')}</td></tr>`); const rows=[['Vigente / no vencida',c.aging.vigente,'green'],['Vencida 1-15',c.aging.v1_15,'green'],['Vencida 16-30',c.aging.v16_30,'yellow'],['Vencida 31-60',c.aging.v31_60,'red'],['Vencida 60+',c.aging.v60,'red']].map(x=>`<tr><td>${x[0]}</td><td>${money(x[1])}</td><td>${pct(x[1]/total*100)}</td><td><div class="progress"><span style="width:${Math.min(100,x[1]/total*100)}%"></span></div></td></tr>`); const commRows=c.commissionRows.sort((a,b)=>b.collected-a.collected).map(r=>`<tr><td>${esc(r.owner)}</td><td>${money(r.billed)}</td><td>${money(r.collected)}</td><td>${money(r.pending)}</td><td>${pct(r.rate)}</td><td>${money(r.commission)}</td></tr>`);
    $('cartera_content').innerHTML=`<div class="kpi-grid">${kpi('Cartera abierta MXN',money(c.total),'Saldo pendiente real convertido','info')}${kpi('DSO estimado',c.dso===null?'Sin base':dec(c.dso,0)+' días','Meta ≤45; requiere ventas capturadas',c.dso===null?'warn':c.dso<=45?'good':c.dso<=60?'warn':'bad')}${kpi('% Cartera 60+',pct(c.pct60),'Meta ≤10%',c.pct60<=10?'good':c.pct60<=20?'warn':'bad')}${kpi('PTP Kept',c.promisesTotal?pct(c.ptpKept):'Sin promesas vencidas',`${c.promisesKept}/${c.promisesTotal} promesas vencidas cumplidas`,!c.promisesTotal?'info':c.ptpKept>=85?'good':'bad')}${kpi('% cobrado 30d',pct(c.collected30),'Venta cobrada / venta capturada 30 días',c.collected30>=70?'good':'warn')}${kpi('% cobrado 60d',pct(c.collected60),'Venta cobrada / venta capturada 60 días',c.collected60>=85?'good':'warn')}${kpi('Clientes bloqueados',int(c.blocked),'Sin score, 60+, promesa, límite o C',c.blocked?'bad':'good')}${kpi('Demanda bloqueada',money(c.demandBlocked),'Pipeline Orden/Entrega/Factura no liberable',c.demandBlocked?'bad':'good')}</div><div class="card"><h2>Aging operativo</h2>${table(['Rango','Saldo MXN','%','Visual'],rows)}<div class="notice ${c.pct60>10?'bad':'good'}"><b>Regla:</b> 31–60 es rojo preventivo; 60+ es bloqueo automático salvo pago aplicado o desbloqueo específico autorizado.</div></div><div class="card"><h2>Estado crédito por cliente</h2>${table(['Cliente','Estado','Banda','CxC sistema','Exposición externa','Pipeline pendiente','Exposición total','Vencido 60+','Límite','Causas'],clientRows)}</div><div class="card"><h2>Comisión estimada sobre cobrado</h2><p class="small muted">Política activa: ${pct(p.commissionPct)} sobre pagos aplicados. Ajustable en Política financiera.</p>${table(['Responsable','Facturado','Cobrado','Pendiente','% Comisión','Comisión estimada'],commRows)}</div>`; }

  function renderEventPost(){ const d=data(); const eventRows=d.events.map(e=>{const pp=financialPolicyFor({event:e.nombre,evento:e.nombre,cultivo:e.cultivo,zona:e.zona}); const leads=d.leads.filter(l=>eq(l.eventId,e.id)); const orders=leads.filter(leadIsOrder); const paid=sum(leads.map(l=>leadPaidMXN(l.id))); const margin=paid*(pp.eventMarginPct/100); const actualRoi=e.cost?((margin-e.cost)/e.cost)*100:0; return `<tr><td>${esc(e.nombre)}</td><td>${int(leads.length)}</td><td>${int(orders.length)}</td><td>${money(paid)}</td><td>${pct(pp.eventMarginPct)}${pp.rule?`<br><span class="small muted">${esc(pp.rule.scope)}: ${esc(pp.rule.key)}</span>`:''}</td><td>${money(margin)}</td><td>${pct(actualRoi)}</td><td>${esc(e.post30||'Pendiente')}</td><td>${esc(e.post90||'Pendiente')}</td><td><button class="btn-warning btn-sm" onclick="APP.edit('post','${esc(e.id)}')">Post</button></td></tr>`}); const latest=latestResultsByTrial(); const trialRows=d.trials.map(t=>{const leads=d.leads.filter(l=>eq(l.trialId,t.id)); const r=latest[t.id]; const paid=sum(leads.map(l=>leadPaidMXN(l.id))); return `<tr><td>${esc(t.id)}</td><td>${esc(t.cultivo)}</td><td>${esc(t.variedad)}</td><td>${pct(r?.roiPct||0)}</td><td>${pct(r?.mejoraPct||0)}</td><td>${int(leads.length)}</td><td>${money(paid)}</td><td>${esc((r?.conclusion||'Pendiente').slice(0,120))}</td><td>${esc((r?.implicacionComercial||r?.recomendacionComercialFinal||r?.recomendacion||'Pendiente').slice(0,120))}</td></tr>`}); $('pipeline_content').innerHTML=`<div class="card"><div class="section-title"><h2>Post-mortem de eventos</h2>${pill('30 / 90 días','blue')}</div><p class="muted">v3.9: el ROI real se calcula con <b>margen cobrado atribuible</b>. Puede usar margen base o regla granular por evento/cultivo.</p>${table(['Evento','Leads','Órdenes','Venta cobrada real','% Margen','Margen cobrado','ROI real cobrado','Post 30','Post 90','Acción'],eventRows)}</div>${state.editing.post?postForm(state.editing.post):''}<div class="card"><div class="section-title"><h2>Post-mortem de ensayos</h2>${pill('Resultado + salida comercial + cobro','blue')}</div>${table(['Folio','Cultivo','Variedad','ROI técnico','Mejora','Leads','Venta cobrada real','Conclusión técnica','Salida comercial / recomendación'],trialRows)}</div>`; }
